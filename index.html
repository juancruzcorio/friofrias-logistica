<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Friofrias · Logística</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px}
.app{display:flex;flex-direction:column;height:100dvh}
.header{background:#fff;border-bottom:1px solid #e5e5e3;padding:0 16px;display:flex;align-items:center;height:48px;flex-shrink:0;flex-wrap:wrap;gap:8px}
.logo{font-size:16px;font-weight:600;color:#1a1a1a;flex-shrink:0}.logo span{color:#185FA5}
.nav{display:flex;gap:0;margin-left:auto;overflow-x:auto}
.nav a{font-size:12px;padding:0 11px;height:48px;display:flex;align-items:center;border-bottom:2px solid transparent;color:#888;text-decoration:none;white-space:nowrap;transition:color .15s}
.nav a.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:500}
.nav a:hover:not(.active){color:#333}
.subheader{background:#fff;border-bottom:1px solid #e5e5e3;padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.date-pick{display:flex;align-items:center;gap:6px}
.date-pick label{font-size:12px;color:#888}
.date-pick input[type=date]{font-size:13px;padding:5px 8px;border:1px solid #e0e0de;border-radius:7px;background:#fff;color:#1a1a1a;outline:none}
.date-pick input[type=date]:focus{border-color:#185FA5}
.btn-hoy{font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid #e0e0de;background:#fff;cursor:pointer;color:#555}
.btn-hoy:hover{background:#f5f5f3}
.btn-auto{font-size:12px;font-weight:500;padding:6px 14px;border-radius:7px;border:none;background:#185FA5;color:#fff;cursor:pointer;margin-left:auto;display:flex;align-items:center;gap:6px}
.btn-auto:hover{background:#0C447C}
.btn-auto:disabled{background:#aaa;cursor:not-allowed}
.route-bar{background:#fff;border-bottom:1px solid #e5e5e3;padding:0 12px;display:flex;align-items:center;flex-shrink:0;overflow-x:auto}
.route-tabs-inner{display:flex;align-items:center}
.route-tab{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#888;white-space:nowrap;transition:all .15s}
.route-tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:500}
.route-tab.segunda{color:#854F0B}
.route-tab.segunda.active{border-bottom-color:#854F0B}
.route-tab .cnt{display:inline-block;font-size:10px;font-weight:600;padding:1px 5px;border-radius:10px;margin-left:4px}
.cnt-normal{background:#E6F1FB;color:#185FA5}
.cnt-over{background:#FCEBEB;color:#A32D2D}
.cnt-segunda{background:#FAEEDA;color:#854F0B}
.btn-nueva-ruta{margin-left:8px;flex-shrink:0;font-size:12px;padding:5px 10px;border-radius:7px;border:1px dashed #bbb;background:none;cursor:pointer;color:#888}
.btn-nueva-ruta:hover{border-color:#185FA5;color:#185FA5}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:320px;flex-shrink:0;background:#fff;border-right:1px solid #e5e5e3;display:flex;flex-direction:column;overflow:hidden}
.route-header{padding:8px 12px;border-bottom:1px solid #f0f0ee;display:flex;align-items:center;gap:6px}
.route-name-input{flex:1;font-size:13px;font-weight:500;padding:5px 8px;border:1px solid #e0e0de;border-radius:7px;background:#fff;color:#1a1a1a;outline:none}
.route-name-input:focus{border-color:#185FA5}
.btn-del-ruta{background:none;border:1px solid #e0e0de;cursor:pointer;font-size:12px;color:#e24b4a;padding:4px 8px;border-radius:6px}
.cap-bar{padding:7px 12px;border-bottom:1px solid #f0f0ee;display:flex;align-items:center;gap:8px;background:#fafaf8}
.cap-bar label{font-size:11px;color:#888;flex-shrink:0}
.cap-bar select{font-size:12px;padding:4px 7px;border:1px solid #e0e0de;border-radius:6px;background:#fff;color:#1a1a1a;outline:none}
.cap-info{font-size:11px;margin-left:auto}
.cap-ok{color:#27ae60;font-weight:500}
.cap-over{color:#e24b4a;font-weight:500}
.segunda-badge{font-size:11px;padding:3px 8px;background:#FAEEDA;color:#854F0B;border-radius:5px;margin-left:auto;font-weight:500}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:8px 12px;border-bottom:1px solid #f0f0ee}
.stat{background:#f8f8f6;border-radius:7px;padding:6px;text-align:center}
.stat-n{font-size:18px;font-weight:500}.stat-l{font-size:10px;color:#888;margin-top:1px}
.ne{color:#185FA5}.nr{color:#A32D2D}.nt{color:#854F0B}
.form{padding:10px 12px;border-bottom:1px solid #f0f0ee;display:flex;flex-direction:column;gap:6px;overflow-y:auto;max-height:320px}
.form input,.form select,.form textarea{width:100%;font-size:12px;padding:6px 8px;border:1px solid #e0e0de;border-radius:7px;background:#fff;color:#1a1a1a;outline:none;font-family:inherit}
.form input:focus,.form select:focus,.form textarea:focus{border-color:#185FA5}
.form textarea{resize:none;height:40px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.form-label{font-size:10px;color:#888;margin-bottom:1px}
.form-group{display:flex;flex-direction:column;gap:2px}
.btn-add{font-size:12px;font-weight:500;padding:8px;border-radius:7px;border:none;background:#185FA5;color:#fff;cursor:pointer}
.btn-add:hover{background:#0C447C}
.btn-add:disabled{background:#aaa;cursor:not-allowed}
.list{flex:1;overflow-y:auto;padding:6px 8px}
.parada{background:#fff;border:1px solid #e5e5e3;border-radius:8px;padding:9px 10px;margin-bottom:5px;position:relative;transition:border-color .15s}
.parada:hover{border-color:#bbb}

.badge{font-size:10px;font-weight:500;padding:2px 6px;border-radius:20px;flex-shrink:0}

.parada-det span{background:#f5f5f3;padding:1px 5px;border-radius:4px}

.btn-del-p{flex:1;background:none;border:1px solid #fcc;border-radius:5px;cursor:pointer;font-size:11px;padding:4px 6px;color:#e24b4a}
.btn-del-p:hover{background:#FCEBEB;border-color:#e24b4a}
.empty{padding:20px;text-align:center;color:#aaa;font-size:12px}
.footer{padding:8px 12px;border-top:1px solid #f0f0ee;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.btn-ruta{font-size:12px;font-weight:500;padding:8px;border-radius:7px;border:none;background:#1a1a1a;color:#fff;cursor:pointer;width:100%}

.footer-sub{display:flex;gap:6px}
.btn-sm{flex:1;font-size:11px;padding:6px 8px;border-radius:7px;border:1px solid #e0e0de;background:#fff;cursor:pointer;color:#555}

.status-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.95);border:1px solid #e0e0de;border-radius:20px;padding:5px 14px;font-size:12px;color:#555;z-index:1000;pointer-events:none;transition:opacity .3s;white-space:nowrap}

.modal h3{font-size:15px;font-weight:500;margin-bottom:12px;color:#1a1a1a}
.modal-ruta{font-family:monospace;font-size:12px;white-space:pre-wrap;background:#f8f8f6;border:1px solid #e5e5e3;border-radius:8px;padding:12px;line-height:1.6;max-height:340px;overflow-y:auto;color:#1a1a1a}
.modal-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn-copy{flex:1;padding:9px;border-radius:7px;border:none;background:#185FA5;color:#fff;font-size:13px;font-weight:500;cursor:pointer;min-width:100px}
.btn-wapp{flex:1;padding:9px;border-radius:7px;border:none;background:#25D366;color:#fff;font-size:13px;font-weight:500;cursor:pointer;min-width:100px}

  .main{flex-direction:column}
  .sidebar{width:100%;max-height:62vh;border-right:none;border-bottom:1px solid #e5e5e3}

</style>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SU="https://ecluhrcrbcybhfucbbst.supabase.co";
const SK="sb_publishable_1MelpVpFmU-Sv-qaZbajhA_DJDF_UQc";
const ORIGEN={lat:-34.745,lng:-58.401};
const CAP_CAMIONETA=6;

async function sb(m,t,b,q=""){
  const r=await fetch(`${SU}/rest/v1/${t}${q}`,{method:m,headers:{"apikey":SK,"Authorization":`Bearer ${SK}`,"Content-Type":"application/json","Prefer":m==="POST"?"return=representation":"return=minimal"},body:b?JSON.stringify(b):undefined});
  if(m==="GET"||m==="POST")return r.json();return r;
}

let fechaActiva=hoy(),rutas=[],rutaIdx=0,map,markers={},rutaTexto="",modoTodos=false;
const CR=["#185FA5","#A32D2D","#854F0B","#2d7d46"];
const CF=["#185FA5","#c0392b","#e67e22","#27ae60","#8e44ad","#7f8c8d"];
const RN=["Camioneta 1","Camioneta 2","Segunda vuelta"];
const DI=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

function hoy(){return new Date().toISOString().slice(0,10)}
function getRuta(){return rutas[rutaIdx]||null}
function getCap(){const r=getRuta();return r?parseInt(r.capacidad||6):6}

async function init(){
  document.getElementById("fecha-input").value=fechaActiva;
  map=L.map("map").setView([-34.62,-58.44],11);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(map);
  await cargarTodo();
  setStatus("Listo",2000);
  setInterval(cargarTodo,30000);
}

async function cargarTodo(){
  try{
    const [rDB,pDB]=await Promise.all([
      sb("GET","rutas",null,`?fecha=eq.${fechaActiva}&order=created_at.asc`),
      sb("GET","paradas",null,`?fecha=eq.${fechaActiva}&order=orden.asc,created_at.asc`)
    ]);
    if(!Array.isArray(rDB))return;
    rutas=rDB.map(r=>({...r,paradas:(Array.isArray(pDB)?pDB:[]).filter(p=>p.ruta_id===r.id)}));
    if(rutas.length===0){
      const r=await sb("POST","rutas",{nombre:"Camioneta 1",fecha:fechaActiva,capacidad:CAP_CAMIONETA,segunda_vuelta:false});
      if(Array.isArray(r)&&r[0])rutas=[{...r[0],paradas:[]}];
    }
    if(rutaIdx>=rutas.length)rutaIdx=0;
    if(modoTodos)await renderTodosMapa();else render();
  }catch(e){setStatus("Sin conexión")}
}

// ── DISTRIBUCION AUTOMATICA ────────────────────────────────────
async function distribuirAutomatico(){
  const btn=document.getElementById("btn-auto");
  btn.disabled=true;btn.textContent="Distribuyendo...";
  setStatus("Analizando pedidos por zona...");
  try{
    // Traer todas las paradas pendientes del día
    const pDB=await sb("GET","paradas",null,`?fecha=eq.${fechaActiva}&done=eq.false&order=created_at.asc`);
    if(!Array.isArray(pDB)||!pDB.length){alert("No hay pedidos pendientes para distribuir.");btn.disabled=false;btn.textContent="⚡ Distribuir rutas automáticamente";return;}

    const conCoords=pDB.filter(p=>p.lat&&p.lng);
    const sinCoords=pDB.filter(p=>!p.lat||!p.lng);

    if(!conCoords.length){alert("Los pedidos no tienen ubicación. Asegurate de que las direcciones estén geocodificadas.");btn.disabled=false;btn.textContent="⚡ Distribuir rutas automáticamente";return;}

    // Calcular total de heladeras
    const totalHel=conCoords.reduce((s,p)=>s+(p.cantidad||1),0);
    const maxPorRuta=CAP_CAMIONETA*2; // 2 camionetas

    // Dividir por zonas usando kmeans-like (bisección por longitud)
    const sorted=[...conCoords].sort((a,b)=>a.lng-b.lng);
    const mitad=Math.ceil(sorted.length/2);
    let zona1=sorted.slice(0,mitad);
    let zona2=sorted.slice(mitad);

    // Aplicar capacidad: si zona1 > 6 heladeras, mover el exceso a segunda vuelta
    let segundaVuelta=[];
    const aplicarCap=(zona)=>{
      let total=0,ok=[],extra=[];
      for(const p of zona){const c=p.cantidad||1;if(total+c<=CAP_CAMIONETA){ok.push(p);total+=c;}else{extra.push(p);}}
      return{ok,extra};
    };
    const r1=aplicarCap(zona1);
    const r2=aplicarCap(zona2);
    segundaVuelta=[...r1.extra,...r2.extra,...sinCoords];

    // Borrar rutas existentes y crear las nuevas
    const rutasViejas=await sb("GET","rutas",null,`?fecha=eq.${fechaActiva}`);
    if(Array.isArray(rutasViejas)){
      for(const r of rutasViejas){
        await sb("DELETE","paradas",null,`?ruta_id=eq.${r.id}`);
        await sb("DELETE","rutas",null,`?id=eq.${r.id}`);
      }
    }

    // Crear Camioneta 1
    const rc1=await sb("POST","rutas",{nombre:"Camioneta 1",fecha:fechaActiva,capacidad:CAP_CAMIONETA,segunda_vuelta:false});
    const ruta1=Array.isArray(rc1)&&rc1[0]?rc1[0]:null;
    if(ruta1){
      const ord1=optimizarNN(r1.ok);
      for(let i=0;i<ord1.length;i++){
        await sb("POST","paradas",{...ord1[i],id:undefined,ruta_id:ruta1.id,orden:i,created_at:undefined});
      }
    }

    // Crear Camioneta 2
    const rc2=await sb("POST","rutas",{nombre:"Camioneta 2",fecha:fechaActiva,capacidad:CAP_CAMIONETA,segunda_vuelta:false});
    const ruta2=Array.isArray(rc2)&&rc2[0]?rc2[0]:null;
    if(ruta2){
      const ord2=optimizarNN(r2.ok);
      for(let i=0;i<ord2.length;i++){
        await sb("POST","paradas",{...ord2[i],id:undefined,ruta_id:ruta2.id,orden:i,created_at:undefined});
      }
    }

    // Crear Segunda vuelta si hay pedidos extra
    if(segundaVuelta.length>0){
      const rc3=await sb("POST","rutas",{nombre:"Segunda vuelta",fecha:fechaActiva,capacidad:CAP_CAMIONETA*2,segunda_vuelta:true});
      const ruta3=Array.isArray(rc3)&&rc3[0]?rc3[0]:null;
      if(ruta3){
        const ord3=optimizarNN(segundaVuelta.filter(p=>p.lat&&p.lng));
        const sinC=segundaVuelta.filter(p=>!p.lat||!p.lng);
        for(let i=0;i<[...ord3,...sinC].length;i++){
          const p=[...ord3,...sinC][i];
          await sb("POST","paradas",{...p,id:undefined,ruta_id:ruta3.id,orden:i,created_at:undefined});
        }
      }
    }

    // Mostrar info
    const infoEl=document.getElementById("auto-info");
    const c1h=r1.ok.reduce((s,p)=>s+(p.cantidad||1),0);
    const c2h=r2.ok.reduce((s,p)=>s+(p.cantidad||1),0);
    const svh=segundaVuelta.reduce((s,p)=>s+(p.cantidad||1),0);
    infoEl.innerHTML=`✓ Rutas distribuidas automáticamente — Camioneta 1: ${c1h} helad. · Camioneta 2: ${c2h} helad.${svh>0?` · Segunda vuelta: ${svh} helad.`:""}`;
    infoEl.classList.add("show");
    setTimeout(()=>infoEl.classList.remove("show"),8000);

    await cargarTodo();
    setStatus("Rutas distribuidas",3000);
  }catch(e){setStatus("Error al distribuir",3000);console.error(e);}
  btn.disabled=false;btn.textContent="⚡ Distribuir rutas automáticamente";
}

// Nearest neighbor desde origen
function optimizarNN(paradas){
  if(!paradas.length)return[];
  let pendientes=[...paradas];
  const resultado=[];
  let actual=ORIGEN;
  while(pendientes.length>0){
    let mejor=null,mejorDist=Infinity;
    pendientes.forEach(p=>{const d=distKm(actual,p);if(d<mejorDist){mejorDist=d;mejor=p;}});
    resultado.push(mejor);actual=mejor;
    pendientes=pendientes.filter(p=>p!==mejor);
  }
  return resultado;
}

async function geocodificar(dir){
  try{
    const q=encodeURIComponent(dir+", Buenos Aires, Argentina");
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=1&countrycodes=ar`,{headers:{"Accept-Language":"es"}});
    const d=await r.json();
    if(d&&d.length>0)return{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
  }catch(e){}return null;
}

function distKm(a,b){
  const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function optimizarOrden(paradas,cap){
  const activas=paradas.filter(p=>!p.done);
  const cc=activas.filter(p=>p.lat&&p.lng),sc=activas.filter(p=>!p.lat||!p.lng);
  if(!cc.length)return activas;
  let e=[...cc.filter(p=>p.tipo==="entrega")],s=[...cc.filter(p=>p.tipo!=="entrega")];
  const re=[];let ac=ORIGEN;
  while(e.length>0){let b=null,bd=Infinity;e.forEach(p=>{const d=distKm(ac,p);if(d<bd){bd=d;b=p;}});re.push(b);ac=b;e=e.filter(p=>p!==b);}
  const rf=[...re];
  s.forEach(sec=>{let bp=rf.length,bc=Infinity;
    for(let i=0;i<=rf.length;i++){const pv=i===0?ORIGEN:rf[i-1],nx=i===rf.length?null:rf[i];const de=nx?distKm(pv,sec)+distKm(sec,nx)-distKm(pv,nx):distKm(pv,sec);if(de*1.6<bc){bc=de*1.6;bp=i;}}
    rf.splice(bp,0,sec);});
  const todas=[...rf,...sc];
  if(cap){let total=0,res=[];for(const p of todas){const c=p.cantidad||1;if(total+c<=cap){res.push(p);total+=c;}}return res;}
  return todas;
}

function generarRuta(){
  const ruta=getRuta();if(!ruta)return;
  const cap=getCap();
  const activas=(ruta.paradas||[]).filter(p=>!p.done);
  if(!activas.length){alert("No hay paradas pendientes.");return}
  const ord=optimizarOrden(ruta.paradas,cap);
  if(!ord.length){alert("Sin paradas.");return}
  const wps=ord.filter(p=>p.lat&&p.lng).map(p=>`${p.lat},${p.lng}`).join("|");
  const dest=ord.filter(p=>p.lat&&p.lng).slice(-1)[0];
  if(!dest){alert("Sin ubicaciones.");return}
  const ml=`https://www.google.com/maps/dir/?api=1&origin=Coronel+Diaz+43+Banfield&destination=${dest.lat},${dest.lng}&waypoints=${wps}&travelmode=driving`;
  const fecha=new Date(fechaActiva+"T12:00:00").toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"});
  const totalHel=ord.reduce((s,p)=>s+(p.cantidad||1),0);
  let t=`🧊 FRIOFRIAS · ${ruta.nombre.toUpperCase()}\n`;
  t+=`📅 ${fecha}\n`;
  if(ruta.segunda_vuelta)t+=`🔄 SEGUNDA VUELTA\n`;
  t+=`📦 ${totalHel} heladera${totalHel!==1?"s":""}\n`;
  t+=`🗺 GPS: ${ml}\n\n`;
  t+=`📍 Salida: Coronel Díaz 43, Banfield\n\n`;
  ord.forEach((p,i)=>{
    const tipo=p.tipo==="entrega"?"Entrega":p.tipo==="reclamo"?"Reclamo":"Retiro";
    const cant=p.cantidad||1;
    t+=`${i+1}. ${p.nombre} [${tipo}${cant>1?" x"+cant:""}]\n`;
    t+=`   📌 ${p.direccion}\n`;
    if(p.turno)t+=`   🕐 ${p.turno}\n`;
    if(p.equipo_retira)t+=`   ⬆️ Retira: ${p.equipo_retira}\n`;
    if(p.equipo_entrega)t+=`   ⬇️ Entrega: ${p.equipo_entrega}${cant>1?" x"+cant:""}\n`;
    if(p.cobro)t+=`   💰 Cobrar: ${p.cobro}\n`;
    if(p.telefono)t+=`   📞 ${p.telefono}\n`;
    if(p.nota)t+=`   📝 ${p.nota}\n`;
    t+="\n";
  });
  if(ord.some(p=>p.equipo_retira))t+=`⚠️ Hay recambios — dejar espacio en la camioneta.\n`;
  const sob=activas.length-ord.length;
  if(sob>0)t+=`\n⏳ Quedan ${sob} paradas para segunda vuelta.`;
  rutaTexto=t;
  document.getElementById("modal-titulo").textContent=`${ruta.nombre}${ruta.segunda_vuelta?" — 2da vuelta":""}`;
  document.getElementById("modal-texto").textContent=t;
  document.getElementById("modal-bg").classList.add("open");
}

function renderPins(){

  rutas.forEach((ruta,ri)=>{

      const cant=p.cantidad||1;acum+=cant;
      const fc=acum>cap&&ri===rutaIdx;
      const pc=fc?"#aaa":color;
      const eq=(p.equipo_entrega||p.equipo_retira||"");
      const lbl=eq.includes("1500")?"1.5k":eq.replace("L","").replace(" black","★").replace(" Coca","©").slice(0,4)||"?";
      const top=cant>1?"x"+cant:pi+1;
      const m=L.marker([p.lat,p.lng],{icon:makePin(pc,top,lbl)}).addTo(map);
      const tipo=p.tipo==="entrega"?"Entrega":p.tipo==="reclamo"?"Reclamo":"Retiro";
      m.bindPopup(`<div style="min-width:180px"><b>${p.nombre}</b>${fc?' <span style="color:#e24b4a;font-size:10px">fuera cupo</span>':""}<br><small style="color:#666">${p.direccion}</small><br><small style="color:#888">${tipo}${cant>1?" x"+cant:""} · ${ruta.nombre}</small>${p.turno?`<br><small>🕐 ${p.turno}</small>`:""}${p.equipo_entrega?`<br><small>⬇️ ${p.equipo_entrega}</small>`:""}${p.equipo_retira?`<br><small>⬆️ ${p.equipo_retira}</small>`:""}${p.cobro?`<br><small style="color:#854F0B">💰 ${p.cobro}</small>`:""}${p.telefono?`<br><small>📞 ${p.telefono}</small>`:""}<br><button onclick="eliminarParada(${ruta.id},${p.id})" style="margin-top:8px;width:100%;padding:6px;background:#e24b4a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px">× Eliminar</button></div>`);
      markers[`${ruta.id}_${p.id}`]=m;allM.push(m);
    });
  });
  if(allM.length>0)map.fitBounds(L.featureGroup(allM).getBounds().pad(0.15));
}

function setRuta(i){rutaIdx=i;render()}
function cambiarFecha(v){fechaActiva=v;rutaIdx=0;rutas=[];modoTodos=false;const b=document.getElementById("btn-todos");b.classList.remove("active");b.textContent="Ver todos los pedidos en el mapa";cargarTodo();}
function irHoy(){fechaActiva=hoy();document.getElementById("fecha-input").value=fechaActiva;cambiarFecha(fechaActiva);}
function setStatus(msg,h=0){const b=document.getElementById("status-bar");b.textContent=msg;b.style.opacity="1";if(h)setTimeout(()=>{b.style.opacity="0"},h);}
init();
</script>
