<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Friofrias · Logística</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px}
    .app{display:flex;flex-direction:column;height:100dvh}
    .header{background:#fff;border-bottom:1px solid #e5e5e3;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
    .logo{font-size:16px;font-weight:700;flex-shrink:0}.logo span{color:#185FA5}
    .date-pick{display:flex;align-items:center;gap:6px}
    .date-pick label{font-size:12px;color:#888}
    .date-pick input[type=date]{font-size:13px;padding:5px 8px;border:1px solid #e0e0de;border-radius:7px;background:#fff;color:#1a1a1a;outline:none}
    .date-pick input[type=date]:focus{border-color:#185FA5}
    .btn-hoy{font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid #e0e0de;background:#fff;cursor:pointer;color:#555}
    .btn-hoy:hover{background:#f0f0ee}
    .route-bar{background:#fff;border-bottom:1px solid #e5e5e3;padding:0 12px;display:flex;align-items:center;flex-shrink:0;overflow-x:auto}
    .route-tabs-inner{display:flex;align-items:center}
    .route-tab{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#888;white-space:nowrap;transition:all .15s}
    .route-tab:hover{color:#333}
    .route-tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:500}
    .route-tab .cnt{display:inline-block;background:#e8f0fb;color:#185FA5;font-size:10px;font-weight:600;padding:1px 5px;border-radius:10px;margin-left:4px}
    .btn-nueva-ruta{margin-left:8px;flex-shrink:0;font-size:12px;padding:5px 10px;border-radius:7px;border:1px dashed #bbb;background:none;cursor:pointer;color:#888;white-space:nowrap}
    .btn-nueva-ruta:hover{border-color:#185FA5;color:#185FA5}
    .main{display:flex;flex:1;overflow:hidden}
    .sidebar{width:320px;flex-shrink:0;background:#fff;border-right:1px solid #e5e5e3;display:flex;flex-direction:column;overflow:hidden}
    .route-header{padding:8px 12px;border-bottom:1px solid #f0f0ee;display:flex;align-items:center;gap:6px}
    .route-name-input{flex:1;font-size:13px;font-weight:500;padding:5px 8px;border:1px solid #e0e0de;border-radius:7px;background:#fff;color:#1a1a1a;outline:none}
    .route-name-input:focus{border-color:#185FA5}
    .btn-del-ruta{background:none;border:none;cursor:pointer;font-size:16px;color:#ccc;padding:2px 5px}
    .btn-del-ruta:hover{color:#e24b4a}
    .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:8px 12px;border-bottom:1px solid #f0f0ee}
    .stat{background:#f8f8f6;border-radius:7px;padding:6px;text-align:center}
    .stat-n{font-size:18px;font-weight:600}.stat-l{font-size:10px;color:#888;margin-top:1px}
    .ne{color:#185FA5}.nr{color:#A32D2D}.nt{color:#854F0B}
    .form{padding:10px 12px;border-bottom:1px solid #f0f0ee;display:flex;flex-direction:column;gap:6px;overflow-y:auto;max-height:330px}
    .form input,.form select,.form textarea{width:100%;font-size:12px;padding:6px 8px;border:1px solid #e0e0de;border-radius:7px;background:#fff;color:#1a1a1a;outline:none;font-family:inherit}
    .form input:focus,.form select:focus,.form textarea:focus{border-color:#185FA5}
    .form textarea{resize:none;height:42px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .form-label{font-size:10px;color:#888;margin-bottom:1px}
    .form-group{display:flex;flex-direction:column;gap:2px}
    .btn-add{font-size:12px;font-weight:500;padding:8px;border-radius:7px;border:none;background:#185FA5;color:#fff;cursor:pointer}
    .btn-add:hover{background:#0C447C}
    .btn-add:disabled{background:#aaa;cursor:not-allowed}
    .list{flex:1;overflow-y:auto;padding:6px 8px}
    .parada{background:#fff;border:1px solid #e5e5e3;border-radius:8px;padding:9px 10px;margin-bottom:5px;position:relative;transition:border-color .15s}
    .parada:hover{border-color:#bbb}
    .parada.done{opacity:.4}
    .parada-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;padding-right:52px}
    .parada-num{width:20px;height:20px;border-radius:50%;background:#185FA5;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .badge{font-size:10px;font-weight:500;padding:2px 6px;border-radius:20px;flex-shrink:0}
    .badge.entrega{background:#E6F1FB;color:#0C447C}
    .badge.reclamo{background:#FCEBEB;color:#791F1F}
    .badge.retiro{background:#FAEEDA;color:#633806}
    .parada-nombre{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .parada-dir{font-size:11px;color:#888;margin-top:1px}
    .parada-det{font-size:11px;color:#aaa;margin-top:2px;display:flex;flex-wrap:wrap;gap:4px}
    .parada-det span{background:#f5f5f3;padding:1px 5px;border-radius:4px}
    .parada-actions{position:absolute;top:7px;right:6px;display:flex;gap:3px}
    .btn-done{background:none;border:1px solid #e0e0de;border-radius:5px;cursor:pointer;font-size:11px;padding:2px 5px;color:#888}
    .btn-done:hover{background:#eafaf3;border-color:#2d9d6e;color:#2d9d6e}
    .btn-del-p{background:none;border:1px solid #e0e0de;border-radius:5px;cursor:pointer;font-size:11px;padding:2px 5px;color:#e24b4a;font-weight:600}
    .btn-del-p:hover{background:#FCEBEB;border-color:#e24b4a}
    .empty{padding:20px;text-align:center;color:#aaa;font-size:12px}
    .footer{padding:8px 12px;border-top:1px solid #f0f0ee;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
    .btn-ruta{font-size:12px;font-weight:500;padding:8px;border-radius:7px;border:none;background:#1a1a1a;color:#fff;cursor:pointer;width:100%}
    .btn-ruta:hover{background:#333}
    .footer-sub{display:flex;gap:6px}
    .btn-sm{flex:1;font-size:11px;padding:6px 8px;border-radius:7px;border:1px solid #e0e0de;background:#fff;cursor:pointer;color:#555}
    .btn-sm:hover{background:#f5f5f3}
    .map-wrap{flex:1;position:relative}
    #map{width:100%;height:100%}
    .status-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.95);border:1px solid #e0e0de;border-radius:20px;padding:5px 14px;font-size:12px;color:#555;z-index:1000;pointer-events:none;transition:opacity .3s;white-space:nowrap}
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2000;align-items:center;justify-content:center}
    .modal-bg.open{display:flex}
    .modal{background:#fff;border-radius:12px;padding:20px;width:92%;max-width:520px;max-height:88vh;overflow-y:auto}
    .modal h3{font-size:15px;font-weight:600;margin-bottom:12px}
    .modal-ruta{font-family:monospace;font-size:12px;white-space:pre-wrap;background:#f8f8f6;border:1px solid #e5e5e3;border-radius:8px;padding:12px;line-height:1.6;max-height:340px;overflow-y:auto}
    .modal-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    .btn-copy{flex:1;padding:9px;border-radius:7px;border:none;background:#185FA5;color:#fff;font-size:13px;font-weight:500;cursor:pointer;min-width:100px}
    .btn-wapp{flex:1;padding:9px;border-radius:7px;border:none;background:#25D366;color:#fff;font-size:13px;font-weight:500;cursor:pointer;min-width:100px}
    .btn-close-modal{padding:9px 16px;border-radius:7px;border:1px solid #e0e0de;background:#fff;font-size:13px;cursor:pointer;color:#555}
    @media(max-width:700px){
      .main{flex-direction:column}
      .sidebar{width:100%;max-height:58vh;border-right:none;border-bottom:1px solid #e5e5e3}
      .map-wrap{min-height:42vh}
    }
  </style>
</head>
<body>

              <option value="470L">470L</option><option value="470L Coca">470L Coca</option><option value="470L black">470L black</option>
              <option value="600L">600L</option><option value="1500L">1500L</option>

          <button class="btn-sm" onclick="abrirWaze()">Waze</button>

        <button class="btn-sm" style="width:100%;margin-top:2px;color:#185FA5;border-color:#185FA5" onclick="abrirTodos()">Ver todos los pedidos pendientes</button>
      </div>
    </div>
    <div class="map-wrap">
      <div class="status-bar" id="status-bar">Cargando mapa...</div>
      <div id="map"></div>
    </div>

</div>
<div class="modal-bg" id="modal-bg" onclick="cerrarModalBg(event)">

    <h3 id="modal-titulo">Ruta optimizada</h3>
    <div class="modal-ruta" id="modal-texto"></div>

      <button class="btn-copy" onclick="copiarRuta()">Copiar texto</button>
      <button class="btn-wapp" onclick="enviarWhatsapp()">WhatsApp</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SUPA_URL='https://ecluhrcrbcybhfucbbst.supabase.co';
const SUPA_KEY='sb_publishable_1MelpVpFmU-Sv-qaZbajhA_DJDF_UQc';
async function sb(method,table,body,query=''){
  const r=await fetch(`${SUPA_URL}/rest/v1/${table}${query}`,{method,headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':'return=minimal'},body:body?JSON.stringify(body):undefined});
  if(method==='GET'||method==='POST')return r.json();
  return r;
}
let fechaActiva=hoyISO(),rutas=[],rutaIdx=0,map,markers={},rutaTexto='';
const COLORES=['#185FA5','#A32D2D','#854F0B','#2d7d46'];
const RNOMBRES=['Camioneta 1 · Mañana','Camioneta 1 · Tarde','Camioneta 2 · Mañana','Camioneta 2 · Tarde'];
function hoyISO(){return new Date().toISOString().slice(0,10)}
function getRuta(){return rutas[rutaIdx]||null}
async function init(){
  document.getElementById('fecha-input').value=fechaActiva;
  map=L.map('map').setView([-34.62,-58.44],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
  await cargarTodo();setStatus('Listo',2000);setInterval(cargarTodo,30000);
}
async function cargarTodo(){
  try{
    const [rDB,pDB]=await Promise.all([sb('GET','rutas',null,`?fecha=eq.${fechaActiva}&order=created_at.asc`),sb('GET','paradas',null,`?fecha=eq.${fechaActiva}&order=orden.asc,created_at.asc`)]);
    if(!Array.isArray(rDB))return;
    rutas=rDB.map(r=>({...r,paradas:(Array.isArray(pDB)?pDB:[]).filter(p=>p.ruta_id===r.id)}));
    if(rutas.length===0){const r=await sb('POST','rutas',{nombre:'Camioneta 1 · Mañana',fecha:fechaActiva});if(Array.isArray(r)&&r[0])rutas=[{...r[0],paradas:[]}];}
    if(rutaIdx>=rutas.length)rutaIdx=0;render();
  }catch(e){setStatus('Sin conexión')}
}
async function nuevaRuta(){
  if(rutas.length>=4){alert('Máximo 4 rutas por día');return}
  const nombre=RNOMBRES[rutas.length]||`Ruta ${rutas.length+1}`;
  const r=await sb('POST','rutas',{nombre,fecha:fechaActiva});
  if(Array.isArray(r)&&r[0]){rutas.push({...r[0],paradas:[]});rutaIdx=rutas.length-1;render()}
}
async function eliminarRuta(){
  const ruta=getRuta();if(!ruta)return;
  if(rutas.length===1){alert('Debe haber al menos una ruta');return}
  if(!confirm(`¿Eliminar "${ruta.nombre}" y todas sus paradas?`))return;
  await sb('DELETE','paradas',null,`?ruta_id=eq.${ruta.id}`);
  await sb('DELETE','rutas',null,`?id=eq.${ruta.id}`);
  rutas.splice(rutaIdx,1);rutaIdx=Math.max(0,rutaIdx-1);render();
}
async function renombrarRuta(nombre){
  const ruta=getRuta();if(!ruta||!nombre.trim())return;
  ruta.nombre=nombre;await sb('PATCH','rutas',{nombre},`?id=eq.${ruta.id}`);buildTabs();
}
async function agregarParada(){
  const ruta=getRuta();if(!ruta)return;
  const nombre=document.getElementById('f-nombre').value.trim();
  const dir=document.getElementById('f-dir').value.trim();
  if(!nombre||!dir){document.getElementById('f-nombre').focus();return}
  const btn=document.getElementById('btn-agregar');
  btn.disabled=true;btn.textContent='Buscando...';setStatus('Geocodificando dirección...');
  const geo=await geocodificar(dir);
  if(!geo){setStatus('No encontré esa dirección. Probá más detalle.',4000);btn.disabled=false;btn.textContent='+ Agregar parada';return}
  const row={ruta_id:ruta.id,fecha:fechaActiva,nombre,direccion:dir,tipo:document.getElementById('f-tipo').value,turno:document.getElementById('f-turno').value,telefono:document.getElementById('f-tel').value.trim(),equipo_entrega:document.getElementById('f-entrega').value,equipo_retira:document.getElementById('f-retira').value,cobro:document.getElementById('f-cobro').value.trim(),nota:document.getElementById('f-nota').value.trim(),lat:geo.lat,lng:geo.lng,done:false,orden:(ruta.paradas||[]).length};
  const ins=await sb('POST','paradas',row);
  if(Array.isArray(ins)&&ins[0]){ruta.paradas=[...(ruta.paradas||[]),ins[0]];['f-nombre','f-dir','f-tel','f-cobro','f-nota'].forEach(id=>document.getElementById(id).value='');document.getElementById('f-entrega').value='';document.getElementById('f-retira').value='';render();setStatus('Parada agregada',2000);}
  btn.disabled=false;btn.textContent='+ Agregar parada';
}
async function marcarDone(rid,pid){
  const ruta=rutas.find(r=>r.id===rid);if(!ruta)return;
  const p=ruta.paradas.find(x=>x.id===pid);
  if(p){p.done=true;await sb('PATCH','paradas',{done:true},`?id=eq.${pid}`);render()}
}
async function eliminarParada(rid,pid){
  if(!confirm('¿Eliminar esta parada?'))return;
  const ruta=rutas.find(r=>r.id===rid);if(!ruta)return;
  ruta.paradas=ruta.paradas.filter(p=>p.id!==pid);
  await sb('DELETE','paradas',null,`?id=eq.${pid}`);render();
}
async function geocodificar(dir){
  try{
    const q=encodeURIComponent(dir+', Buenos Aires, Argentina');
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=1&countrycodes=ar`,{headers:{'Accept-Language':'es'}});
    const d=await r.json();
    if(d&&d.length>0)return{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
  }catch(e){}
  return null;
}
function distKm(a,b){
  const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function optimizarOrden(paradas){
  const conCoords=paradas.filter(p=>p.lat&&p.lng);
  const sinCoords=paradas.filter(p=>!p.lat||!p.lng);
  if(conCoords.length<=1)return paradas;
  const ORIGEN={lat:-34.745,lng:-58.401};
  let entregas=[...conCoords.filter(p=>p.tipo==='entrega')];
  let secundarios=[...conCoords.filter(p=>p.tipo!=='entrega')];
  const rutaEntregas=[];let actual=ORIGEN;
  while(entregas.length>0){
    let mejor=null,mejorDist=Infinity;
    entregas.forEach(p=>{const d=distKm(actual,p);if(d<mejorDist){mejorDist=d;mejor=p;}});
    rutaEntregas.push(mejor);actual=mejor;entregas=entregas.filter(p=>p!==mejor);
  }
  const rutaFinal=[...rutaEntregas];
  secundarios.forEach(sec=>{
    let mejorPos=rutaFinal.length,mejorCosto=Infinity;
    for(let i=0;i<=rutaFinal.length;i++){
      const prev=i===0?ORIGEN:rutaFinal[i-1];
      const next=i===rutaFinal.length?null:rutaFinal[i];
      const dExtra=next?distKm(prev,sec)+distKm(sec,next)-distKm(prev,next):distKm(prev,sec);
      if(dExtra*1.6<mejorCosto){mejorCosto=dExtra*1.6;mejorPos=i;}
    }
    rutaFinal.splice(mejorPos,0,sec);
  });
  return [...rutaFinal,...sinCoords];
}
function generarRuta(){
  const ruta=getRuta();if(!ruta)return;
  const activas=(ruta.paradas||[]).filter(p=>!p.done);
  if(!activas.length){alert('No hay paradas pendientes.');return}
  const ordenadas=optimizarOrden(activas);
  const origen='Coronel+Diaz+43+Banfield';
  const wps=ordenadas.filter(p=>p.lat&&p.lng).map(p=>`${p.lat},${p.lng}`).join('|');
  const dest=ordenadas.filter(p=>p.lat&&p.lng).slice(-1)[0];
  const mapsLink=`https://www.google.com/maps/dir/?api=1&origin=${origen}&destination=${dest.lat},${dest.lng}&waypoints=${wps}&travelmode=driving`;
  const fecha=new Date(fechaActiva+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  let t=`🧊 *FRIOFRIAS · ${ruta.nombre.toUpperCase()}*\n`;
  t+=`📅 ${fecha}\n`;
  t+=`🗺 Link GPS: ${mapsLink}\n\n`;
  t+=`📍 *Salida: Coronel Díaz 43, Banfield*\n\n`;
  ordenadas.forEach((p,i)=>{
    const tipo=p.tipo==='entrega'?'Entrega':p.tipo==='reclamo'?'Reclamo':'Retiro';
    t+=`*${i+1}. ${p.nombre}* [${tipo}]\n`;
    t+=`📌 ${p.direccion}\n`;
    if(p.turno)t+=`🕐 Turno ${p.turno}\n`;
    if(p.equipo_retira)t+=`⬆️ Retira: ${p.equipo_retira}\n`;
    if(p.equipo_entrega)t+=`⬇️ Entrega: ${p.equipo_entrega}\n`;
    if(p.cobro)t+=`💰 Cobrar: ${p.cobro}\n`;
    if(p.telefono)t+=`📞 Tel: ${p.telefono}\n`;
    if(p.nota)t+=`📝 ${p.nota}\n`;
    t+='\n';
  });
  if(ordenadas.some(p=>p.equipo_retira))t+=`⚠️ *IMPORTANTE:* Hay recambios — dejar espacio en la camioneta.\n`;
  t+=`\n📊 *${ordenadas.length} paradas · Ruta optimizada automáticamente*`;
  rutaTexto=t;
  document.getElementById('modal-titulo').textContent=`Ruta optimizada: ${ruta.nombre}`;
  document.getElementById('modal-texto').textContent=t;
  document.getElementById('modal-bg').classList.add('open');
}
function copiarRuta(){navigator.clipboard.writeText(rutaTexto).then(()=>alert('¡Copiado! Pegalo en WhatsApp.'))}
function enviarWhatsapp(){window.open(`https://wa.me/?text=${encodeURIComponent(rutaTexto)}`,'_blank')}
async function abrirTodos(){
  const hoy=new Date(),dow=hoy.getDay(),lunes=new Date(hoy);
  lunes.setDate(hoy.getDate()-(dow===0?6:dow-1));
  const fechas=Array.from({length:6},(_,i)=>{const d=new Date(lunes);d.setDate(lunes.getDate()+i);return d.toISOString().slice(0,10);});
  const DIAS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  setStatus('Cargando todos los pedidos...');
  try{
    const [rDB,pDB]=await Promise.all([sb('GET','rutas',null,'?order=fecha.asc,created_at.asc'),sb('GET','paradas',null,'?done=eq.false&order=fecha.asc,created_at.asc')]);
    if(!Array.isArray(rDB)||!Array.isArray(pDB)){setStatus('Error',3000);return;}
    const sf=new Set(fechas);
    const rutasSemana=rDB.filter(r=>sf.has(r.fecha));
    const paradasPendientes=pDB.filter(p=>sf.has(p.fecha));
    let html='',total=0;
    fechas.forEach(fecha=>{
      const rutasDelDia=rutasSemana.filter(r=>r.fecha===fecha);
      const paradasDelDia=paradasPendientes.filter(p=>p.fecha===fecha);
      if(!paradasDelDia.length)return;
      total+=paradasDelDia.length;
      const d=new Date(fecha+'T12:00:00');
      const esHoy=fecha===hoyISO();
      html+='<div style="margin-bottom:16px">';
      html+='<div style="font-size:12px;font-weight:600;color:#185FA5;padding:6px 0;border-bottom:1px solid #e5e5e3;margin-bottom:8px">';
      html+=DIAS[d.getDay()]+' '+d.getDate()+'/'+(d.getMonth()+1)+(esHoy?' · HOY':'');
      html+=' <span style="color:#888;font-weight:400">('+paradasDelDia.length+' pendientes)</span></div>';
      rutasDelDia.forEach(ruta=>{
        const pRuta=paradasDelDia.filter(p=>p.ruta_id===ruta.id);
        if(!pRuta.length)return;
        html+='<div style="font-size:11px;color:#888;margin-bottom:4px;font-weight:500">'+ruta.nombre+'</div>';
        pRuta.forEach(p=>{
          const tipo=p.tipo==='entrega'?'Entrega':p.tipo==='reclamo'?'Reclamo':'Retiro';
          const color=p.tipo==='entrega'?'#0C447C':p.tipo==='reclamo'?'#791F1F':'#633806';
          const bg=p.tipo==='entrega'?'#E6F1FB':p.tipo==='reclamo'?'#FCEBEB':'#FAEEDA';
          html+='<div style="background:#f8f8f6;border-radius:7px;padding:8px 10px;margin-bottom:4px;cursor:pointer" onclick="irAFecha(\''+fecha+'\')">';
          html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">';
          html+='<span style="font-size:10px;font-weight:500;padding:2px 6px;border-radius:20px;background:'+bg+';color:'+color+'">'+tipo+'</span>';
          html+='<span style="font-size:12px;font-weight:500">'+p.nombre+'</span></div>';
          html+='<div style="font-size:11px;color:#888">'+p.direccion+'</div>';
          html+='<div style="font-size:11px;color:#aaa;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap">';
          if(p.turno)html+='<span>🕐 '+p.turno+'</span>';
          if(p.equipo_entrega)html+='<span>⬇️ '+p.equipo_entrega+'</span>';
          if(p.equipo_retira)html+='<span>⬆️ '+p.equipo_retira+'</span>';
          if(p.cobro)html+='<span style="color:#854F0B">💰 '+p.cobro+'</span>';
          if(p.telefono)html+='<span>📞 '+p.telefono+'</span>';
          html+='</div></div>';
        });
      });
      html+='</div>';
    });
    if(!total)html='<div style="text-align:center;color:#aaa;padding:24px">No hay pedidos pendientes esta semana</div>';
    document.getElementById('todos-contenido').innerHTML=html;
    document.getElementById('modal-todos').classList.add('open');
    setStatus('Listo',1000);
  }catch(e){setStatus('Error cargando pedidos',3000);}
}
function irAFecha(fecha){cerrarTodos();fechaActiva=fecha;document.getElementById('fecha-input').value=fecha;rutaIdx=0;rutas=[];cargarTodo();}
function cerrarTodos(){document.getElementById('modal-todos').classList.remove('open')}
function cerrarTodosBg(e){if(e.target===document.getElementById('modal-todos'))cerrarTodos()}
function cerrarModal(){document.getElementById('modal-bg').classList.remove('open')}
function cerrarModalBg(e){if(e.target===document.getElementById('modal-bg'))cerrarModal()}
function abrirGoogleMaps(){
  const ruta=getRuta();if(!ruta)return;
  const activas=(ruta.paradas||[]).filter(p=>!p.done);
  const ordenadas=optimizarOrden(activas).filter(p=>p.lat&&p.lng);
  if(!ordenadas.length){alert('Sin paradas con ubicación.');return}
  const wps=ordenadas.map(p=>`${p.lat},${p.lng}`).join('|');
  window.open(`https://www.google.com/maps/dir/?api=1&origin=Coronel+Diaz+43+Banfield&destination=${ordenadas.slice(-1)[0].lat},${ordenadas.slice(-1)[0].lng}&waypoints=${wps}&travelmode=driving`,'_blank');
}
function abrirWaze(){
  const ruta=getRuta();if(!ruta)return;
  const a=(ruta.paradas||[]).filter(p=>!p.done&&p.lat&&p.lng);
  if(!a.length){alert('Sin paradas con ubicación.');return}
  window.open(`https://waze.com/ul?ll=${a[0].lat},${a[0].lng}&navigate=yes`,'_blank');
}
function render(){buildTabs();renderSidebar();renderPins()}
function buildTabs(){
  document.getElementById('route-tabs').innerHTML=rutas.map((r,i)=>{
    const cnt=(r.paradas||[]).filter(p=>!p.done).length;
    return `<div class="route-tab${i===rutaIdx?' active':''}" onclick="setRuta(${i})">${r.nombre}${cnt>0?`<span class="cnt">${cnt}</span>`:''}</div>`;
  }).join('');
}
function renderSidebar(){
  const ruta=getRuta();
  if(!ruta){document.getElementById('lista').innerHTML='<div class="empty">Sin rutas para este día</div>';return}
  document.getElementById('ruta-nombre').value=ruta.nombre;
  const paradas=ruta.paradas||[];
  const activas=paradas.filter(p=>!p.done);
  document.getElementById('cnt-e').textContent=activas.filter(p=>p.tipo==='entrega').length;
  document.getElementById('cnt-r').textContent=activas.filter(p=>p.tipo==='reclamo').length;
  document.getElementById('cnt-t').textContent=activas.filter(p=>p.tipo==='retiro').length;
  if(!paradas.length){document.getElementById('lista').innerHTML='<div class="empty">Sin paradas — agregá la primera</div>';return}
  document.getElementById('lista').innerHTML=paradas.map((p,i)=>{
    const tipo=p.tipo==='entrega'?'Entrega':p.tipo==='reclamo'?'Reclamo':'Retiro';
    return `<div class="parada${p.done?' done':''}">
      <div class="parada-actions">
        ${!p.done?`<button class="btn-done" onclick="marcarDone(${ruta.id},${p.id})">✓ Entregado</button>`:'<span style="font-size:11px;color:#2d9d6e;padding:2px 6px;background:#eafaf3;border-radius:5px">✓ Entregado</span>'}
        <button class="btn-del-p" onclick="eliminarParada(${ruta.id},${p.id})">× Borrar</button>
      </div>
      <div class="parada-top">
        <div class="parada-num">${i+1}</div>
        <span class="badge ${p.tipo}">${tipo}</span>
        <span class="parada-nombre">${p.nombre}</span>
      </div>
      <div class="parada-dir">${p.direccion}</div>
      <div class="parada-det">
        ${p.turno?`<span>🕐 ${p.turno}</span>`:''}
        ${p.equipo_entrega?`<span>⬇️ ${p.equipo_entrega}</span>`:''}
        ${p.equipo_retira?`<span>⬆️ ${p.equipo_retira}</span>`:''}
        ${p.cobro?`<span style="color:#854F0B">💰 ${p.cobro}</span>`:''}
        ${p.telefono?`<span>📞 ${p.telefono}</span>`:''}
      </div>
    </div>`;
  }).join('');
}
function renderPins(){
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};const allM=[];
  rutas.forEach((ruta,ri)=>{
    const color=COLORES[ri%COLORES.length];
    (ruta.paradas||[]).filter(p=>!p.done&&p.lat&&p.lng).forEach((p,pi)=>{
      const eq=(p.equipo_entrega||p.equipo_retira||'');
      const label=eq.includes('1500')?'1.5k':eq.replace('L','').replace(' black','★').replace(' Coca','©').slice(0,5)||'?';
      const icon=L.divIcon({html:`<svg xmlns="http://www.w3.org/2000/svg" width="46" height="52" viewBox="0 0 46 52"><circle cx="23" cy="21" r="19" fill="${color}" stroke="white" stroke-width="2.5"/><text x="23" y="17" text-anchor="middle" font-size="9" font-weight="700" fill="white" font-family="sans-serif">${pi+1}</text><text x="23" y="28" text-anchor="middle" font-size="10" font-weight="700" fill="white" font-family="sans-serif">${label}</text><polygon points="23,48 15,32 31,32" fill="${color}"/></svg>`,className:'',iconSize:[46,52],iconAnchor:[23,50],popupAnchor:[0,-48]});
      const m=L.marker([p.lat,p.lng],{icon}).addTo(map);
      const tipo=p.tipo==='entrega'?'Entrega':p.tipo==='reclamo'?'Reclamo':'Retiro';
      m.bindPopup(`<strong>${p.nombre}</strong><br><span style="font-size:11px">${p.direccion}</span><br><span style="font-size:11px;color:#666">${tipo} · ${ruta.nombre}</span>${p.turno?`<br><span style="font-size:11px">🕐 ${p.turno}</span>`:''}${p.equipo_entrega?`<br><span style="font-size:11px">⬇️ ${p.equipo_entrega}</span>`:''}${p.equipo_retira?`<br><span style="font-size:11px">⬆️ ${p.equipo_retira}</span>`:''}${p.cobro?`<br><span style="font-size:11px;color:#854F0B">💰 ${p.cobro}</span>`:''}${p.telefono?`<br><span style="font-size:11px">📞 ${p.telefono}</span>`:''}`);
      markers[`${ruta.id}_${p.id}`]=m;allM.push(m);
    });
  });
  if(allM.length>0)map.fitBounds(L.featureGroup(allM).getBounds().pad(0.15));
}
function setRuta(i){rutaIdx=i;render()}
function cambiarFecha(v){fechaActiva=v;rutaIdx=0;rutas=[];cargarTodo();}
function irHoy(){fechaActiva=hoyISO();document.getElementById('fecha-input').value=fechaActiva;cambiarFecha(fechaActiva);}
function setStatus(msg,hideAfter=0){const b=document.getElementById('status-bar');b.textContent=msg;b.style.opacity='1';if(hideAfter)setTimeout(()=>{b.style.opacity='0'},hideAfter);}
init();
</script>
