<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Friofrias · Logística</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f1117;color:#e8e8f0;font-size:14px}
.app{display:flex;flex-direction:column;height:100dvh}
.header{background:#0f1117;border-bottom:1px solid #252836;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
.logo{font-size:16px;font-weight:500;color:#fff;flex-shrink:0}.logo span{color:#4d9fff}
.nav{display:flex;gap:0;margin-left:auto;overflow-x:auto}
.nav a{font-size:12px;padding:0 12px;height:36px;display:flex;align-items:center;border-bottom:2px solid transparent;color:#7a7a8c;text-decoration:none;white-space:nowrap}
.nav a.active{color:#4d9fff;border-bottom-color:#4d9fff;font-weight:500}
.nav a:hover:not(.active){color:#ccc}
.date-pick{display:flex;align-items:center;gap:6px}
.date-pick label{font-size:12px;color:#7a7a8c}
.date-pick input[type=date]{font-size:13px;padding:5px 8px;border:1px solid #252836;border-radius:7px;background:#161b27;color:#e8e8f0;outline:none}
.btn-hoy{font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid #252836;background:#161b27;cursor:pointer;color:#7a7a8c}
.route-bar{background:#0f1117;border-bottom:1px solid #252836;padding:0 12px;display:flex;align-items:center;flex-shrink:0;overflow-x:auto}
.route-tabs-inner{display:flex;align-items:center}
.route-tab{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#7a7a8c;white-space:nowrap}
.route-tab.active{color:#4d9fff;border-bottom-color:#4d9fff;font-weight:500}
.route-tab .cnt{display:inline-block;background:#0d1e2b;color:#4d9fff;font-size:10px;font-weight:600;padding:1px 5px;border-radius:10px;margin-left:4px}
.btn-nueva-ruta{margin-left:8px;flex-shrink:0;font-size:12px;padding:5px 10px;border-radius:7px;border:1px dashed #252836;background:none;cursor:pointer;color:#7a7a8c}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:320px;flex-shrink:0;background:#0f1117;border-right:1px solid #252836;display:flex;flex-direction:column;overflow:hidden}
.route-header{padding:8px 12px;border-bottom:1px solid #252836;display:flex;align-items:center;gap:6px}
.route-name-input{flex:1;font-size:13px;font-weight:500;padding:5px 8px;border:1px solid #252836;border-radius:7px;background:#161b27;color:#e8e8f0;outline:none}
.btn-del-ruta{background:none;border:1px solid #252836;cursor:pointer;font-size:12px;color:#f87171;padding:4px 8px;border-radius:6px}
.cap-bar{padding:7px 12px;border-bottom:1px solid #252836;display:flex;align-items:center;gap:8px;background:#0d1117}
.cap-bar label{font-size:11px;color:#7a7a8c;flex-shrink:0}
.cap-bar select{font-size:12px;padding:4px 7px;border:1px solid #252836;border-radius:6px;background:#161b27;color:#e8e8f0;outline:none}
.cap-info{font-size:11px;margin-left:auto}
.cap-ok{color:#3ecf8e;font-weight:500}
.cap-over{color:#f87171;font-weight:500}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:8px 12px;border-bottom:1px solid #252836}
.stat{background:#161b27;border-radius:7px;padding:6px;text-align:center;border:1px solid #252836}
.stat-n{font-size:18px;font-weight:500}.stat-l{font-size:10px;color:#7a7a8c;margin-top:1px}
.ne{color:#4d9fff}.nr{color:#f87171}.nt{color:#fbbf24}
.form{padding:10px 12px;border-bottom:1px solid #252836;display:flex;flex-direction:column;gap:6px;overflow-y:auto;max-height:340px}
.form input,.form select,.form textarea{width:100%;font-size:12px;padding:6px 8px;border:1px solid #252836;border-radius:7px;background:#161b27;color:#e8e8f0;outline:none;font-family:inherit}
.form input:focus,.form select:focus,.form textarea:focus{border-color:#4d9fff}
.form textarea{resize:none;height:40px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.form-label{font-size:10px;color:#7a7a8c;margin-bottom:1px}
.form-group{display:flex;flex-direction:column;gap:2px}
.btn-add{font-size:12px;font-weight:500;padding:8px;border-radius:7px;border:none;background:#4d9fff;color:#fff;cursor:pointer}
.btn-add:hover{background:#2d7fe0}
.btn-add:disabled{background:#252836;color:#555;cursor:not-allowed}
.list{flex:1;overflow-y:auto;padding:6px 8px}
.parada{background:#161b27;border:1px solid #252836;border-radius:8px;padding:9px 10px;margin-bottom:5px;position:relative}
.parada.done{opacity:.35}
.parada-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.parada-num{width:20px;height:20px;border-radius:50%;background:#4d9fff;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.badge{font-size:10px;font-weight:500;padding:2px 6px;border-radius:20px;flex-shrink:0}
.badge.entrega{background:#0d1e2b;color:#4d9fff}
.badge.reclamo{background:#2b0d0d;color:#f87171}
.badge.retiro{background:#2b1e0d;color:#fbbf24}
.parada-nombre{font-size:12px;font-weight:500;color:#e8e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.parada-dir{font-size:11px;color:#7a7a8c;margin-top:1px}
.parada-det{font-size:11px;color:#555;margin-top:2px;display:flex;flex-wrap:wrap;gap:4px}
.parada-det span{background:#0f1117;padding:1px 5px;border-radius:4px;color:#7a7a8c}
.parada-btns{display:flex;gap:5px;margin-top:6px}
.btn-done{flex:1;background:none;border:1px solid #252836;border-radius:5px;cursor:pointer;font-size:11px;padding:4px 6px;color:#3ecf8e}
.btn-done:hover{background:#0d2b1e;border-color:#3ecf8e}
.btn-del-p{flex:1;background:none;border:1px solid #2b1515;border-radius:5px;cursor:pointer;font-size:11px;padding:4px 6px;color:#f87171}
.btn-del-p:hover{background:#2b0d0d;border-color:#f87171}
.empty{padding:20px;text-align:center;color:#555;font-size:12px}
.footer{padding:8px 12px;border-top:1px solid #252836;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.btn-ruta{font-size:12px;font-weight:500;padding:8px;border-radius:7px;border:none;background:#e8e8f0;color:#0f1117;cursor:pointer;width:100%}
.btn-ruta:hover{background:#fff}
.footer-sub{display:flex;gap:6px}
.btn-sm{flex:1;font-size:11px;padding:6px 8px;border-radius:7px;border:1px solid #252836;background:#161b27;cursor:pointer;color:#7a7a8c}
.btn-sm:hover{background:#252836;color:#e8e8f0}
.btn-todos{width:100%;font-size:11px;padding:7px;border-radius:7px;border:1px solid #4d9fff;background:transparent;cursor:pointer;color:#4d9fff;font-weight:500;margin-top:2px}
.btn-todos.active{background:#4d9fff;color:#fff}
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}
.status-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(15,17,23,.95);border:1px solid #252836;border-radius:20px;padding:5px 14px;font-size:12px;color:#7a7a8c;z-index:1000;pointer-events:none;transition:opacity .3s;white-space:nowrap}
.map-legend{position:absolute;bottom:24px;right:10px;background:rgba(15,17,23,.95);border:1px solid #252836;border-radius:8px;padding:8px 12px;font-size:11px;z-index:1000;display:none}
.map-legend.show{display:block}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;color:#7a7a8c}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#161b27;border:1px solid #252836;border-radius:12px;padding:20px;width:92%;max-width:520px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:500;margin-bottom:12px;color:#fff}
.modal-ruta{font-family:monospace;font-size:12px;white-space:pre-wrap;background:#0f1117;border:1px solid #252836;border-radius:8px;padding:12px;line-height:1.6;max-height:340px;overflow-y:auto;color:#e8e8f0}
.modal-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn-copy{flex:1;padding:9px;border-radius:7px;border:none;background:#4d9fff;color:#fff;font-size:13px;font-weight:500;cursor:pointer;min-width:100px}
.btn-wapp{flex:1;padding:9px;border-radius:7px;border:none;background:#25D366;color:#fff;font-size:13px;font-weight:500;cursor:pointer;min-width:100px}
.btn-close-modal{padding:9px 16px;border-radius:7px;border:1px solid #252836;background:#161b27;font-size:13px;cursor:pointer;color:#7a7a8c}
@media(max-width:700px){
  .main{flex-direction:column}
  .sidebar{width:100%;max-height:62vh;border-right:none;border-bottom:1px solid #252836}
  .map-wrap{min-height:38vh}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Frio<span>frias</span></div>
    <div class="date-pick">
      <label>Fecha:</label>
      <input type="date" id="fecha-input" onchange="cambiarFecha(this.value)"/>
      <button class="btn-hoy" onclick="irHoy()">Hoy</button>
    </div>
    <nav class="nav">
      <a href="index.html" class="active">Logística</a>
      <a href="finanzas.html">Finanzas</a>
      <a href="stock.html">Stock</a>
      <a href="clientes.html">Clientes</a>
      <a href="performance.html">Performance</a>
      <a href="config.html">Config</a>
    </nav>
  </div>
  <div class="route-bar">
    <div class="route-tabs-inner" id="route-tabs"></div>
    <button class="btn-nueva-ruta" onclick="nuevaRuta()">+ Nueva ruta</button>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="route-header">
        <input class="route-name-input" id="ruta-nombre" type="text" placeholder="Nombre de la ruta" onblur="renombrarRuta(this.value)"/>
        <button class="btn-del-ruta" onclick="eliminarRuta()">× Eliminar</button>
      </div>
      <div class="cap-bar">
        <label>Capacidad:</label>
        <select id="ruta-cap" onchange="cambiarCapacidad(parseInt(this.value))">
          <option value="1">1 heladera</option>
          <option value="2">2 heladeras</option>
          <option value="3">3 heladeras</option>
          <option value="4">4 heladeras</option>
          <option value="5">5 heladeras</option>
          <option value="6" selected>6 heladeras</option>
        </select>
        <span class="cap-info" id="cap-info"></span>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-n ne" id="cnt-e">0</div><div class="stat-l">Entregas</div></div>
        <div class="stat"><div class="stat-n nr" id="cnt-r">0</div><div class="stat-l">Reclamos</div></div>
        <div class="stat"><div class="stat-n nt" id="cnt-t">0</div><div class="stat-l">Retiros</div></div>
      </div>
      <div class="form">
        <div class="row2">
          <div class="form-group"><div class="form-label">Tipo</div>
            <select id="f-tipo"><option value="entrega">Entrega</option><option value="reclamo">Reclamo</option><option value="retiro">Retiro</option></select>
          </div>
          <div class="form-group"><div class="form-label">Turno</div>
            <select id="f-turno"><option value="manana">Mañana</option><option value="tarde">Tarde</option><option value="todo el dia">Todo el día</option></select>
          </div>
        </div>
        <div class="form-group"><div class="form-label">Cliente</div><input id="f-nombre" type="text" placeholder="Nombre del cliente"/></div>
        <div class="form-group"><div class="form-label">Dirección</div><input id="f-dir" type="text" placeholder="Av. Corrientes 2500, CABA"/></div>
        <div class="form-group"><div class="form-label">Teléfono</div><input id="f-tel" type="text" placeholder="11 1234-5678"/></div>
        <div class="row2">
          <div class="form-group"><div class="form-label">Entrega</div>
            <select id="f-entrega">
              <option value="">ninguno</option>
              <option value="390L">390L</option><option value="390L black">390L black</option>
              <option value="470L">470L</option><option value="470L black">470L black</option>
              <option value="600L">600L</option><option value="600L black">600L black</option>
              <option value="1500L">1500L</option>
            </select>
          </div>
          <div class="form-group"><div class="form-label">Cantidad</div>
            <select id="f-cantidad">
              <option value="1">1 heladera</option>
              <option value="2">2 heladeras</option>
              <option value="3">3 heladeras</option>
              <option value="4">4 heladeras</option>
              <option value="5">5 heladeras</option>
              <option value="6">6 heladeras</option>
            </select>
          </div>
        </div>
        <div class="form-group"><div class="form-label">Retira</div>
          <select id="f-retira">
            <option value="">ninguno</option>
            <option value="390L">390L</option><option value="390L Coca">390L Coca</option><option value="390L black">390L black</option>
            <option value="470L">470L</option><option value="470L Coca">470L Coca</option><option value="470L black">470L black</option>
            <option value="600L">600L</option><option value="1500L">1500L</option>
          </select>
        </div>
        <div class="row2">
          <div class="form-group"><div class="form-label">Cobro pendiente</div><input id="f-cobro" type="text" placeholder="ej: $50.000"/></div>
          <div class="form-group"><div class="form-label">Forma de pago</div>

              <option value="efectivo">Efectivo</option>

        <div class="form-group"><div class="form-label">Nota</div><textarea id="f-nota" placeholder="Aclaraciones..."></textarea></div>

      <div class="list" id="lista"></div>
      <div class="footer">
        <button class="btn-ruta" onclick="generarRuta()">Generar ruta optimizada</button>

          <button class="btn-sm" onclick="abrirGoogleMaps()">Google Maps</button>
          <button class="btn-sm" onclick="abrirWaze()">Waze</button>

</div>
<div class="modal-bg" id="modal-bg" onclick="cerrarModalBg(event)">
  <div class="modal">
    <h3 id="modal-titulo">Ruta optimizada</h3>
    <div class="modal-ruta" id="modal-texto"></div>
    <div class="modal-actions">
      <button class="btn-copy" onclick="copiarRuta()">Copiar texto</button>
      <button class="btn-wapp" onclick="enviarWhatsapp()">WhatsApp</button>
      <button class="btn-close-modal" onclick="cerrarModal()">Cerrar</button>
    </div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SU="https://ecluhrcrbcybhfucbbst.supabase.co";
const SK="sb_publishable_1MelpVpFmU-Sv-qaZbajhA_DJDF_UQc";
async function sb(m,t,b,q=""){
  const r=await fetch(`${SU}/rest/v1/${t}${q}`,{method:m,headers:{"apikey":SK,"Authorization":`Bearer ${SK}`,"Content-Type":"application/json","Prefer":m==="POST"?"return=representation":"return=minimal"},body:b?JSON.stringify(b):undefined});
  if(m==="GET"||m==="POST")return r.json();return r;
}
let fechaActiva=hoy(),rutas=[],rutaIdx=0,map,markers={},rutaTexto="",modoTodos=false;
const CR=["#4d9fff","#f87171","#fbbf24","#3ecf8e"];
const CF=["#4d9fff","#f87171","#fbbf24","#3ecf8e","#a78bfa","#7a7a8c"];
const RN=["Camioneta 1 Manana","Camioneta 1 Tarde","Camioneta 2 Manana","Camioneta 2 Tarde"];
const DI=["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];
function hoy(){return new Date().toISOString().slice(0,10)}
function getRuta(){return rutas[rutaIdx]||null}
function getCap(){const r=getRuta();return r?parseInt(r.capacidad||6):6}

async function init(){
  document.getElementById("fecha-input").value=fechaActiva;
  map=L.map("map").setView([-34.62,-58.44],11);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"OpenStreetMap",maxZoom:19}).addTo(map);
  await cargarTodo();setStatus("Listo",2000);setInterval(cargarTodo,30000);
}

async function cargarTodo(){
  try{
    const [rDB,pDB]=await Promise.all([
      sb("GET","rutas",null,`?fecha=eq.${fechaActiva}&order=created_at.asc`),
      sb("GET","paradas",null,`?fecha=eq.${fechaActiva}&order=orden.asc,created_at.asc`)
    ]);
    if(!Array.isArray(rDB))return;
    rutas=rDB.map(r=>({...r,paradas:(Array.isArray(pDB)?pDB:[]).filter(p=>p.ruta_id===r.id)}));
    if(rutas.length===0){
      const r=await sb("POST","rutas",{nombre:"Camioneta 1 Manana",fecha:fechaActiva,capacidad:6});
      if(Array.isArray(r)&&r[0])rutas=[{...r[0],paradas:[]}];
    }
    if(rutaIdx>=rutas.length)rutaIdx=0;
    if(modoTodos)await renderTodosMapa();else render();
  }catch(e){setStatus("Sin conexion")}
}

async function nuevaRuta(){
  if(rutas.length>=4){alert("Maximo 4 rutas");return}
  const r=await sb("POST","rutas",{nombre:RN[rutas.length]||"Ruta "+(rutas.length+1),fecha:fechaActiva,capacidad:6});
  if(Array.isArray(r)&&r[0]){rutas.push({...r[0],paradas:[]});rutaIdx=rutas.length-1;render()}
}

async function eliminarRuta(){
  const ruta=getRuta();if(!ruta)return;
  if(rutas.length===1){alert("Debe haber al menos una ruta");return}
  if(!confirm("Eliminar "+ruta.nombre+"?"))return;
  await sb("DELETE","paradas",null,"?ruta_id=eq."+ruta.id);
  await sb("DELETE","rutas",null,"?id=eq."+ruta.id);
  rutas.splice(rutaIdx,1);rutaIdx=Math.max(0,rutaIdx-1);render();
}

async function renombrarRuta(nombre){
  const r=getRuta();if(!r||!nombre.trim())return;
  r.nombre=nombre;await sb("PATCH","rutas",{nombre},"?id=eq."+r.id);buildTabs();
}

async function cambiarCapacidad(cap){
  const r=getRuta();if(!r)return;
  r.capacidad=cap;await sb("PATCH","rutas",{capacidad:cap},"?id=eq."+r.id);
  renderCapInfo();renderPins();
}

async function agregarParada(){
  const ruta=getRuta();if(!ruta)return;
  const nombre=document.getElementById("f-nombre").value.trim();
  const dir=document.getElementById("f-dir").value.trim();
  if(!nombre||!dir){document.getElementById("f-nombre").focus();return}
  const btn=document.getElementById("btn-agregar");
  btn.disabled=true;btn.textContent="Buscando...";setStatus("Buscando direccion...");
  const geo=await geocodificar(dir);
  if(!geo){setStatus("No encontre la direccion.",4000);btn.disabled=false;btn.textContent="+ Agregar parada";return}
  const row={
    ruta_id:ruta.id,fecha:fechaActiva,nombre,direccion:dir,
    tipo:document.getElementById("f-tipo").value,
    turno:document.getElementById("f-turno").value,
    telefono:document.getElementById("f-tel").value.trim(),
    equipo_entrega:document.getElementById("f-entrega").value,
    cantidad:parseInt(document.getElementById("f-cantidad").value)||1,
    equipo_retira:document.getElementById("f-retira").value,
    cobro:document.getElementById("f-cobro").value.trim(),
    forma_pago:document.getElementById("f-forma").value,
    nota:document.getElementById("f-nota").value.trim(),
    lat:geo.lat,lng:geo.lng,done:false,orden:(ruta.paradas||[]).length
  };
  const ins=await sb("POST","paradas",row);
  if(Array.isArray(ins)&&ins[0]){
    ruta.paradas=[...(ruta.paradas||[]),ins[0]];
    ["f-nombre","f-dir","f-tel","f-cobro","f-nota"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("f-entrega").value="";
    document.getElementById("f-retira").value="";
    document.getElementById("f-cantidad").value="1";
    render();setStatus("Parada agregada",2000);
  }
  btn.disabled=false;btn.textContent="+ Agregar parada";
}

async function marcarDone(rid,pid){
  const ruta=rutas.find(r=>r.id===rid);if(!ruta)return;
  const p=ruta.paradas.find(x=>x.id===pid);
  if(!p)return;
  p.done=true;
  await sb("PATCH","paradas",{done:true},"?id=eq."+pid);
  // Registrar venta automaticamente
  if(p.tipo==="entrega"&&p.equipo_entrega){
    const preciosDB=await sb("GET","stock",null,"?modelo=eq."+encodeURIComponent(p.equipo_entrega));
    const precio=Array.isArray(preciosDB)&&preciosDB[0]?preciosDB[0].precio:0;
    const costo=Array.isArray(preciosDB)&&preciosDB[0]?preciosDB[0].costo:0;
    await sb("POST","ventas",{
      parada_id:p.id,cliente_nombre:p.nombre,direccion:p.direccion,
      modelo:p.equipo_entrega,cantidad:p.cantidad||1,
      precio_unitario:precio,costo_unitario:costo,
      forma_pago:p.forma_pago||"efectivo",fecha:fechaActiva
    });
  }
  render();
}

async function eliminarParada(rid,pid){
  if(!confirm("Eliminar esta parada?"))return;
  const ruta=rutas.find(r=>r.id===rid);if(!ruta)return;
  ruta.paradas=ruta.paradas.filter(p=>p.id!==pid);
  await sb("DELETE","paradas",null,"?id=eq."+pid);
  map.closePopup();render();
}

async function eliminarParadaGlobal(pid){
  if(!confirm("Eliminar esta parada?"))return;
  await sb("DELETE","paradas",null,"?id=eq."+pid);
  map.closePopup();
  if(modoTodos)await renderTodosMapa();else await cargarTodo();
}

async function geocodificar(dir){
  try{
    const q=encodeURIComponent(dir+", Buenos Aires, Argentina");
    const r=await fetch("https://nominatim.openstreetmap.org/search?format=json&q="+q+"&limit=1&countrycodes=ar",{headers:{"Accept-Language":"es"}});
    const d=await r.json();
    if(d&&d.length>0)return{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
  }catch(e){}return null;
}

function distKm(a,b){
  const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function optimizarOrden(paradas,cap){
  const activas=paradas.filter(p=>!p.done);
  const cc=activas.filter(p=>p.lat&&p.lng),sc=activas.filter(p=>!p.lat||!p.lng);
  if(!cc.length)return activas;
  const O={lat:-34.745,lng:-58.401};
  let e=[...cc.filter(p=>p.tipo==="entrega")],s=[...cc.filter(p=>p.tipo!=="entrega")];
  const re=[];let ac=O;
  while(e.length>0){let b=null,bd=Infinity;e.forEach(p=>{const d=distKm(ac,p);if(d<bd){bd=d;b=p;}});re.push(b);ac=b;e=e.filter(p=>p!==b);}
  const rf=[...re];
  s.forEach(sec=>{let bp=rf.length,bc=Infinity;
    for(let i=0;i<=rf.length;i++){const pv=i===0?O:rf[i-1],nx=i===rf.length?null:rf[i];const de=nx?distKm(pv,sec)+distKm(sec,nx)-distKm(pv,nx):distKm(pv,sec);if(de*1.6<bc){bc=de*1.6;bp=i;}}
    rf.splice(bp,0,sec);});
  // Respetar capacidad por cantidad de heladeras
  if(cap){
    let total=0;const resultado=[];
    for(const p of [...rf,...sc]){
      const cant=p.cantidad||1;
      if(total+cant<=cap){resultado.push(p);total+=cant;}
    }
    return resultado;
  }
  return [...rf,...sc];
}

function generarRuta(){
  const ruta=getRuta();if(!ruta)return;
  const cap=getCap();
  const activas=(ruta.paradas||[]).filter(p=>!p.done);
  if(!activas.length){alert("No hay paradas pendientes.");return}
  const ord=optimizarOrden(ruta.paradas,cap);
  if(!ord.length){alert("Sin paradas.");return}
  const wps=ord.filter(p=>p.lat&&p.lng).map(p=>p.lat+","+p.lng).join("|");
  const dest=ord.filter(p=>p.lat&&p.lng).slice(-1)[0];
  if(!dest){alert("Sin ubicaciones.");return}
  const ml="https://www.google.com/maps/dir/?api=1&origin=Coronel+Diaz+43+Banfield&destination="+dest.lat+","+dest.lng+"&waypoints="+wps+"&travelmode=driving";
  const fecha=new Date(fechaActiva+"T12:00:00").toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"});
  const totalHel=ord.reduce((s,p)=>s+(p.cantidad||1),0);
  let t="FRIOFRIAS - "+ruta.nombre.toUpperCase()+"\n";
  t+="Fecha: "+fecha+"\n";
  t+="Capacidad: "+cap+" heladeras ("+totalHel+" cargadas)\n";
  t+="GPS: "+ml+"\n\nSalida: Coronel Diaz 43, Banfield\n\n";
  ord.forEach((p,i)=>{
    const tipo=p.tipo==="entrega"?"Entrega":p.tipo==="reclamo"?"Reclamo":"Retiro";
    const cant=p.cantidad||1;
    t+=(i+1)+". "+p.nombre+" ["+tipo+(cant>1?" x"+cant:"")+"]"+" \n   "+p.direccion+"\n";
    if(p.turno)t+="   Turno: "+p.turno+"\n";
    if(p.equipo_retira)t+="   Retira: "+p.equipo_retira+"\n";
    if(p.equipo_entrega)t+="   Entrega: "+p.equipo_entrega+(cant>1?" x"+cant:"")+"\n";
    if(p.cobro)t+="   Cobrar: "+p.cobro+"\n";
    if(p.telefono)t+="   Tel: "+p.telefono+"\n";
    if(p.nota)t+="   Nota: "+p.nota+"\n";
    t+="\n";
  });
  if(ord.some(p=>p.equipo_retira))t+="IMPORTANTE: Hay recambios - dejar espacio.\n";
  const sob=activas.length-ord.length;
  if(sob>0)t+="\nQuedan "+sob+" paradas fuera del cupo.";
  rutaTexto=t;
  document.getElementById("modal-titulo").textContent="Ruta: "+ruta.nombre+" ("+totalHel+"/"+cap+" helad.)";
  document.getElementById("modal-texto").textContent=t;
  document.getElementById("modal-bg").classList.add("open");
}

function copiarRuta(){navigator.clipboard.writeText(rutaTexto).then(()=>alert("Copiado!"))}
function enviarWhatsapp(){window.open("https://wa.me/?text="+encodeURIComponent(rutaTexto),"_blank")}
function cerrarModal(){document.getElementById("modal-bg").classList.remove("open")}
function cerrarModalBg(e){if(e.target===document.getElementById("modal-bg"))cerrarModal()}

function abrirGoogleMaps(){
  const ruta=getRuta();if(!ruta)return;
  const ord=optimizarOrden(ruta.paradas,getCap()).filter(p=>p.lat&&p.lng);
  if(!ord.length){alert("Sin paradas.");return}
  window.open("https://www.google.com/maps/dir/?api=1&origin=Coronel+Diaz+43+Banfield&destination="+ord.slice(-1)[0].lat+","+ord.slice(-1)[0].lng+"&waypoints="+ord.map(p=>p.lat+","+p.lng).join("|")+"&travelmode=driving","_blank");
}
function abrirWaze(){
  const ruta=getRuta();if(!ruta)return;
  const a=(ruta.paradas||[]).filter(p=>!p.done&&p.lat&&p.lng);
  if(!a.length){alert("Sin paradas.");return}
  window.open("https://waze.com/ul?ll="+a[0].lat+","+a[0].lng+"&navigate=yes","_blank");
}

async function toggleTodos(){
  modoTodos=!modoTodos;
  const btn=document.getElementById("btn-todos");
  if(modoTodos){btn.textContent="Ver solo hoy";btn.classList.add("active");await renderTodosMapa();}
  else{btn.textContent="Ver todos los pedidos en el mapa";btn.classList.remove("active");document.getElementById("map-legend").classList.remove("show");render();}
}

async function renderTodosMapa(){
  setStatus("Cargando todos los pedidos...");
  try{
    const [pDB,rDB]=await Promise.all([sb("GET","paradas",null,"?done=eq.false&order=fecha.asc,created_at.asc"),sb("GET","rutas",null,"?order=fecha.asc")]);
    if(!Array.isArray(pDB))return;
    const fu=[...new Set(pDB.map(p=>p.fecha))].sort();
    const rm={};if(Array.isArray(rDB))rDB.forEach(r=>rm[r.id]=r);
    Object.values(markers).forEach(m=>map.removeLayer(m));markers={};const allM=[];
    fu.forEach((fecha,fi)=>{
      const color=CF[fi%CF.length];
      pDB.filter(p=>p.fecha===fecha&&p.lat&&p.lng).forEach((p,pi)=>{
        const eq=(p.equipo_entrega||p.equipo_retira||"");
        const lbl=eq.includes("1500")?"1.5k":eq.replace("L","").replace(" black","*").replace(" Coca","C").slice(0,5)||"?";
        const cant=p.cantidad||1;
        const icon=L.divIcon({html:'<svg xmlns="http://www.w3.org/2000/svg" width="46" height="52" viewBox="0 0 46 52"><circle cx="23" cy="21" r="19" fill="'+color+'" stroke="#0f1117" stroke-width="2.5"/><text x="23" y="17" text-anchor="middle" font-size="9" font-weight="700" fill="white" font-family="sans-serif">'+(cant>1?"x"+cant:pi+1)+'</text><text x="23" y="28" text-anchor="middle" font-size="10" font-weight="700" fill="white" font-family="sans-serif">'+lbl+'</text><polygon points="23,48 15,32 31,32" fill="'+color+'"/></svg>',className:"",iconSize:[46,52],iconAnchor:[23,50],popupAnchor:[0,-48]});
        const m=L.marker([p.lat,p.lng],{icon}).addTo(map);
        const tipo=p.tipo==="entrega"?"Entrega":p.tipo==="reclamo"?"Reclamo":"Retiro";
        const d=new Date(fecha+"T12:00:00");
        const fl=DI[d.getDay()]+" "+d.getDate()+"/"+(d.getMonth()+1)+(fecha===hoy()?" HOY":"");
        m.bindPopup('<div style="min-width:180px;background:#161b27;color:#e8e8f0;padding:4px"><b style="color:#fff">'+p.nombre+'</b><br><small style="color:#7a7a8c">'+p.direccion+'</small><br><small style="color:#7a7a8c">'+tipo+(cant>1?" x"+cant:"")+'</small><br><small style="color:'+color+'">'+fl+'</small>'+(p.telefono?'<br><small style="color:#7a7a8c">Tel: '+p.telefono+'</small>':"")+'<br><button onclick="eliminarParadaGlobal('+p.id+')" style="margin-top:8px;width:100%;padding:6px;background:#f87171;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px">× Eliminar</button></div>');
        markers["g_"+p.id]=m;allM.push(m);
      });
    });
    const legend=document.getElementById("map-legend");
    legend.style.color="#e8e8f0";
    legend.innerHTML='<div style="font-size:11px;font-weight:500;margin-bottom:6px;color:#fff">Leyenda</div>'+fu.map((fecha,fi)=>{const d=new Date(fecha+"T12:00:00");const cnt=pDB.filter(p=>p.fecha===fecha).length;return '<div class="leg-row"><div class="leg-dot" style="background:'+CF[fi%CF.length]+'"></div>'+DI[d.getDay()]+" "+d.getDate()+"/"+(d.getMonth()+1)+(fecha===hoy()?" (hoy)":"")+" - "+cnt+"</div>";}).join("");
    legend.classList.add("show");
    if(allM.length>0)map.fitBounds(L.featureGroup(allM).getBounds().pad(0.15));
    setStatus(pDB.length+" pedidos pendientes",3000);
  }catch(e){setStatus("Error",3000);}
}

function render(){buildTabs();renderSidebar();renderPins()}

function renderCapInfo(){
  const ruta=getRuta();if(!ruta)return;
  const cap=getCap();
  const totalHel=(ruta.paradas||[]).filter(p=>!p.done).reduce((s,p)=>s+(p.cantidad||1),0);
  const info=document.getElementById("cap-info");
  info.innerHTML=totalHel>cap?'<span class="cap-over">'+totalHel+"/"+cap+" excede</span>":'<span class="cap-ok">'+totalHel+"/"+cap+" helad.</span>";
  document.getElementById("ruta-cap").value=cap;
}

function buildTabs(){
  document.getElementById("route-tabs").innerHTML=rutas.map((r,i)=>{
    const totalHel=(r.paradas||[]).filter(p=>!p.done).reduce((s,p)=>s+(p.cantidad||1),0);
    const cap=parseInt(r.capacidad||6),over=totalHel>cap;
    return '<div class="route-tab'+(i===rutaIdx?" active":"")+'" onclick="setRuta('+i+')">'+r.nombre+(totalHel>0?'<span class="cnt" style="'+(over?"background:#2b0d0d;color:#f87171":"")+'">'+(over?"!":"")+totalHel+"/"+cap+"</span>":"")+"</div>";
  }).join("");
}

function makePin(color,top,bot){
  return L.divIcon({html:'<svg xmlns="http://www.w3.org/2000/svg" width="46" height="52" viewBox="0 0 46 52"><circle cx="23" cy="21" r="19" fill="'+color+'" stroke="#0f1117" stroke-width="2.5"/><text x="23" y="17" text-anchor="middle" font-size="9" font-weight="700" fill="white" font-family="sans-serif">'+top+'</text><text x="23" y="28" text-anchor="middle" font-size="10" font-weight="700" fill="white" font-family="sans-serif">'+bot+'</text><polygon points="23,48 15,32 31,32" fill="'+color+'"/></svg>',className:"",iconSize:[46,52],iconAnchor:[23,50],popupAnchor:[0,-48]});
}

function renderSidebar(){
  const ruta=getRuta();
  if(!ruta){document.getElementById("lista").innerHTML='<div class="empty">Sin rutas para este día</div>';return}
  document.getElementById("ruta-nombre").value=ruta.nombre;
  renderCapInfo();
  const paradas=ruta.paradas||[],activas=paradas.filter(p=>!p.done);
  document.getElementById("cnt-e").textContent=activas.filter(p=>p.tipo==="entrega").length;
  document.getElementById("cnt-r").textContent=activas.filter(p=>p.tipo==="reclamo").length;
  document.getElementById("cnt-t").textContent=activas.filter(p=>p.tipo==="retiro").length;
  if(!paradas.length){document.getElementById("lista").innerHTML='<div class="empty">Sin paradas</div>';return}
  const cap=getCap();
  let acum=0;
  document.getElementById("lista").innerHTML=optimizarOrden(paradas,999).map((p,i)=>{
    const tipo=p.tipo==="entrega"?"Entrega":p.tipo==="reclamo"?"Reclamo":"Retiro";
    const cant=p.cantidad||1;
    if(!p.done)acum+=cant;
    const fc=!p.done&&acum>cap;
    return '<div class="parada'+(p.done?" done":"")+'" style="'+(fc?"border-color:#f87171;":"")+'">'+(fc?'<div style="font-size:10px;color:#f87171;margin-bottom:3px">Fuera del cupo</div>':"")+
      '<div class="parada-top"><div class="parada-num" style="'+(fc?"background:#f87171":"")+'">'+(i+1)+'</div><span class="badge '+p.tipo+'">'+tipo+'</span><span class="parada-nombre">'+p.nombre+'</span></div>'+
      '<div class="parada-dir">'+p.direccion+'</div>'+
      '<div class="parada-det">'+
      (p.turno?'<span>'+p.turno+'</span>':"")+
      (p.equipo_entrega?'<span>'+p.equipo_entrega+(cant>1?" x"+cant:"")+'</span>':"")+
      (p.equipo_retira?'<span>Retira: '+p.equipo_retira+'</span>':"")+
      (p.cobro?'<span style="color:#fbbf24">'+p.cobro+'</span>':"")+
      (p.telefono?'<span>'+p.telefono+'</span>':"")+'</div>'+
      (!p.done?'<div class="parada-btns"><button class="btn-done" onclick="marcarDone('+ruta.id+','+p.id+')">✓ Entregado</button><button class="btn-del-p" onclick="eliminarParada('+ruta.id+','+p.id+')">× Eliminar</button></div>':
      '<div style="font-size:11px;color:#3ecf8e;padding:4px 0">✓ Entregado</div>')+'</div>';
  }).join("");
}

function renderPins(){
  Object.values(markers).forEach(m=>map.removeLayer(m));markers={};const allM=[];
  document.getElementById("map-legend").classList.remove("show");
  const cap=getCap();
  rutas.forEach((ruta,ri)=>{
    const color=CR[ri%CR.length];
    const ord=optimizarOrden(ruta.paradas||[],999);
    let acum=0;
    ord.filter(p=>!p.done&&p.lat&&p.lng).forEach((p,pi)=>{
      const cant=p.cantidad||1;acum+=cant;
      const fc=acum>cap&&ri===rutaIdx;
      const pc=fc?"#555":color;
      const eq=(p.equipo_entrega||p.equipo_retira||"");
      const lbl=eq.includes("1500")?"1.5k":eq.replace("L","").replace(" black","*").replace(" Coca","C").slice(0,5)||"?";
      const top=cant>1?"x"+cant:pi+1;
      const m=L.marker([p.lat,p.lng],{icon:makePin(pc,top,lbl)}).addTo(map);
      const tipo=p.tipo==="entrega"?"Entrega":p.tipo==="reclamo"?"Reclamo":"Retiro";
      m.bindPopup('<div style="min-width:180px;background:#161b27;color:#e8e8f0;padding:4px"><b style="color:#fff">'+p.nombre+'</b>'+(fc?' <span style="color:#f87171;font-size:10px">fuera cupo</span>':"")+
        '<br><small style="color:#7a7a8c">'+p.direccion+'</small><br><small style="color:#7a7a8c">'+tipo+(cant>1?" x"+cant:"")+" - "+ruta.nombre+'</small>'+
        (p.turno?'<br><small style="color:#7a7a8c">Turno: '+p.turno+'</small>':"")+(p.cobro?'<br><small style="color:#fbbf24">Cobrar: '+p.cobro+'</small>':"")+
        (p.telefono?'<br><small style="color:#7a7a8c">Tel: '+p.telefono+'</small>':"")+
        '<br><button onclick="eliminarParada('+ruta.id+','+p.id+')" style="margin-top:8px;width:100%;padding:6px;background:#f87171;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px">× Eliminar</button></div>');
      markers[ruta.id+"_"+p.id]=m;allM.push(m);
    });
  });
  if(allM.length>0)map.fitBounds(L.featureGroup(allM).getBounds().pad(0.15));
}

function setRuta(i){rutaIdx=i;render()}
function cambiarFecha(v){fechaActiva=v;rutaIdx=0;rutas=[];modoTodos=false;const b=document.getElementById("btn-todos");b.classList.remove("active");b.textContent="Ver todos los pedidos en el mapa";cargarTodo();}
function irHoy(){fechaActiva=hoy();document.getElementById("fecha-input").value=fechaActiva;cambiarFecha(fechaActiva);}
function setStatus(msg,h=0){const b=document.getElementById("status-bar");b.textContent=msg;b.style.opacity="1";if(h)setTimeout(()=>{b.style.opacity="0"},h);}
init();
</script>
