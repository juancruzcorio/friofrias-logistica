<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Friofrias · Performance</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px}
.header{background:#fff;border-bottom:1px solid #e5e5e3;padding:0 16px;display:flex;align-items:center;height:48px;flex-wrap:wrap;gap:8px}
.logo{font-size:16px;font-weight:600;color:#1a1a1a}.logo span{color:#185FA5}
.nav{display:flex;gap:0;margin-left:auto;overflow-x:auto}
.nav a{font-size:12px;padding:0 11px;height:48px;display:flex;align-items:center;border-bottom:2px solid transparent;color:#888;text-decoration:none;white-space:nowrap}
.nav a.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:500}
.nav a:hover:not(.active){color:#333}
.content{padding:16px;max-width:960px;margin:0 auto}
.fecha-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.fecha-bar label{font-size:12px;color:#888}
.fecha-bar select{font-size:13px;padding:5px 9px;border:1px solid #e0e0de;border-radius:7px;background:#fff;color:#1a1a1a;outline:none}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:#fff;border:0.5px solid #e5e5e3;border-radius:10px;padding:12px 14px}
.stat-l{font-size:11px;color:#888;margin-bottom:4px}
.stat-n{font-size:22px;font-weight:500}
.stat-sub{font-size:10px;color:#aaa;margin-top:2px}
.n-azul{color:#185FA5}.n-verde{color:#27ae60}.n-rojo{color:#e24b4a}.n-amber{color:#854F0B}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.card{background:#fff;border:0.5px solid #e5e5e3;border-radius:12px;padding:14px 16px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:500;color:#888;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
.motivo-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid #f5f5f3}
.motivo-row:last-child{border-bottom:none}
.motivo-label{flex:1;font-size:12px;color:#1a1a1a}
.motivo-bar-wrap{width:100px;height:4px;background:#f0f0ee;border-radius:2px;overflow:hidden}
.motivo-bar{height:4px;border-radius:2px;background:#e24b4a}
.motivo-n{font-size:12px;font-weight:500;min-width:24px;text-align:right;color:#888}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;font-size:10px;font-weight:500;color:#888;padding:4px 8px;border-bottom:1px solid #f0f0ee;text-transform:uppercase;letter-spacing:.04em}
.tbl td{padding:7px 8px;border-bottom:0.5px solid #f5f5f3;color:#1a1a1a}
.tbl tr:last-child td{border-bottom:none}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.b-verde{background:#EAF3DE;color:#27500A}
.b-rojo{background:#FCEBEB;color:#791F1F}
.b-amber{background:#FAEEDA;color:#633806}
.b-azul{background:#E6F1FB;color:#0C447C}
.form-rb{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;padding:12px;background:#fafaf8;border-radius:8px;border:0.5px solid #e5e5e3;margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;color:#888;font-weight:500}
.fg input,.fg select{font-size:12px;padding:6px 8px;border:0.5px solid #e0e0de;border-radius:6px;background:#fff;color:#1a1a1a;outline:none}
.btn-rb{font-size:12px;padding:6px 14px;border-radius:7px;border:none;background:#e24b4a;color:#fff;cursor:pointer;align-self:flex-end}
.empty{padding:16px;text-align:center;color:#aaa;font-size:12px}
</style>
</head>
<body>
<div class="header">
  <div class="logo">Frio<span>frias</span></div>
  <nav class="nav">
    <a href="index.html">Logística</a>
    <a href="finanzas.html">Finanzas</a>
    <a href="stock.html">Stock</a>
    <a href="clientes.html">Clientes</a>
    <a href="performance.html" class="active">Performance</a>
    <a href="config.html">Config</a>
  </nav>
</div>
<div class="content">
  <div class="fecha-bar">
    <label>Periodo:</label>
    <select id="filtro" onchange="cargar()">
      <option value="semana">Esta semana</option>
      <option value="mes" selected>Este mes</option>
      <option value="total">Todo el tiempo</option>
    </select>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-l">Tasa de éxito</div><div class="stat-n n-verde" id="s-tasa">—</div><div class="stat-sub" id="s-tasa-sub"></div></div>
    <div class="stat"><div class="stat-l">Completadas</div><div class="stat-n n-azul" id="s-ok">0</div><div class="stat-sub">entregas exitosas</div></div>
    <div class="stat"><div class="stat-l">Fallidas / rebotes</div><div class="stat-n n-rojo" id="s-fail">0</div><div class="stat-sub" id="s-fail-sub"></div></div>
    <div class="stat"><div class="stat-l">Reclamos</div><div class="stat-n n-amber" id="s-rec">0</div><div class="stat-sub" id="s-rec-sub"></div></div>
  </div>
  <div class="card">
    <div class="card-title">Registrar entrega fallida</div>
    <div class="form-rb">
      <div class="fg"><label>Cliente / dirección</label><input id="rb-cliente" type="text" placeholder="Nombre o dirección" style="width:180px"/></div>
      <div class="fg"><label>Motivo</label>
        <select id="rb-motivo">
          <option value="no_estaba">Cliente no estaba</option>
          <option value="cancelo">Canceló en el momento</option>
          <option value="dir_incorrecta">Dirección incorrecta</option>
          <option value="prob_equipo">Problema con el equipo</option>
          <option value="otro">Otro motivo</option>
        </select>
      </div>
      <div class="fg"><label>Fecha</label><input id="rb-fecha" type="date" style="width:140px"/></div>
      <button class="btn-rb" onclick="registrarRebote()">Registrar fallida</button>
    </div>
    <div class="grid2">
      <div>
        <div class="card-title">Motivos de rebote</div>
        <div id="motivos-lista"></div>
      </div>
      <div>
        <div class="card-title">Últimas fallidas</div>
        <table class="tbl">
          <thead><tr><th>Cliente</th><th>Motivo</th><th>Fecha</th></tr></thead>
          <tbody id="rebotes-tabla"></tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="card-title">Modelos más vendidos</div>
      <table class="tbl" id="modelos-tabla">
        <thead><tr><th>Modelo</th><th>Variante</th><th>Vendidas</th><th>%</th></tr></thead>
        <tbody id="modelos-tbody"></tbody>
      </table>
    </div>
    <div class="card">
      <div class="card-title">Tendencia semanal de ventas</div>
      <canvas id="chart-tend" height="120"></canvas>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const SU="https://ecluhrcrbcybhfucbbst.supabase.co";
const SK="sb_publishable_1MelpVpFmU-Sv-qaZbajhA_DJDF_UQc";
async function sb(m,t,b,q=""){
  const r=await fetch(`${SU}/rest/v1/${t}${q}`,{method:m,headers:{"apikey":SK,"Authorization":`Bearer ${SK}`,"Content-Type":"application/json","Prefer":m==="POST"?"return=representation":"return=minimal"},body:b?JSON.stringify(b):undefined});
  if(m==="GET"||m==="POST")return r.json();return r;
}
function hoy(){return new Date().toISOString().slice(0,10)}
const ML={"no_estaba":"No estaba","cancelo":"Canceló","dir_incorrecta":"Dir. incorrecta","prob_equipo":"Prob. equipo","otro":"Otro"};
let chartT=null;

function getRango(){
  const p=document.getElementById("filtro").value,h=hoy();
  if(p==="semana"){const d=new Date(),dow=d.getDay(),l=new Date(d);l.setDate(d.getDate()-(dow===0?6:dow-1));return{desde:l.toISOString().slice(0,10),hasta:h};}
  if(p==="mes"){const d=new Date();return{desde:new Date(d.getFullYear(),d.getMonth(),1).toISOString().slice(0,10),hasta:h};}
  return{desde:"2024-01-01",hasta:h};
}

async function cargar(){
  const{desde,hasta}=getRango();
  const [paradas,ventas,rebotes]=await Promise.all([
    sb("GET","paradas",null,`?fecha=gte.${desde}&fecha=lte.${hasta}&order=fecha.desc`),
    sb("GET","ventas",null,`?fecha=gte.${desde}&fecha=lte.${hasta}&order=fecha.desc`),
    sb("GET","movimientos",null,`?categoria=eq.rebote&fecha=gte.${desde}&fecha=lte.${hasta}&order=fecha.desc`)
  ]);
  const p=Array.isArray(paradas)?paradas:[];
  const v=Array.isArray(ventas)?ventas:[];
  const rb=Array.isArray(rebotes)?rebotes:[];
  const completadas=p.filter(x=>x.done&&x.tipo==="entrega").length;
  const total=completadas+rb.length;
  const tasa=total>0?Math.round(completadas/total*100):100;
  const reclamos=p.filter(x=>x.tipo==="reclamo").length;
  document.getElementById("s-tasa").textContent=tasa+"%";
  document.getElementById("s-tasa-sub").textContent=total+" intentos";
  document.getElementById("s-ok").textContent=completadas;
  document.getElementById("s-fail").textContent=rb.length;
  document.getElementById("s-rec").textContent=reclamos;
  const mc={};rb.forEach(r=>{const k=r.descripcion||"otro";mc[k]=(mc[k]||0)+1;});
  const maxM=Math.max(...Object.values(mc),1);
  document.getElementById("motivos-lista").innerHTML=Object.entries(mc).sort((a,b)=>b[1]-a[1]).map(([k,n])=>`<div class="motivo-row"><div class="motivo-label">${ML[k]||k}</div><div class="motivo-bar-wrap"><div class="motivo-bar" style="width:${Math.round(n/maxM*100)}%"></div></div><div class="motivo-n">${n}</div></div>`).join("")||'<div class="empty">Sin rebotes registrados</div>';
  document.getElementById("rebotes-tabla").innerHTML=rb.slice(0,8).map(r=>{const d=new Date(r.fecha+"T12:00:00");return`<tr><td>${r.cliente_nombre||r.descripcion||"—"}</td><td><span class="badge b-rojo">${ML[r.descripcion]||r.descripcion}</span></td><td>${d.getDate()}/${d.getMonth()+1}</td></tr>`;}).join("")||'<tr><td colspan="3" class="empty">Sin registros</td></tr>';
  const vCnt={};
  v.forEach(x=>{if(x.modelo){const k=x.modelo;vCnt[k]=(vCnt[k]||0)+parseInt(x.cantidad||1);}});
  const tv=Object.values(vCnt).reduce((s,n)=>s+n,0)||1;
  document.getElementById("modelos-tbody").innerHTML=Object.entries(vCnt).sort((a,b)=>b[1]-a[1]).map(([m,n])=>`<tr><td style="font-weight:500">${m.replace(/ /g,"&nbsp;").split("&nbsp;")[0]}</td><td style="color:#888">${m.split(" ").slice(1).join(" ")||"Normal"}</td><td style="color:#185FA5;font-weight:500">${n}</td><td><span class="badge b-azul">${Math.round(n/tv*100)}%</span></td></tr>`).join("")||'<tr><td colspan="4" class="empty">Sin ventas</td></tr>';
  const semanas=[];const now=new Date();
  for(let i=5;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i*7);semanas.push(d.toISOString().slice(0,10));}
  const vSem=semanas.map(s=>{const fin=new Date(s);fin.setDate(fin.getDate()+6);return v.filter(x=>x.fecha>=s&&x.fecha<=fin.toISOString().slice(0,10)).reduce((a,x)=>a+parseInt(x.cantidad||1),0);});
  if(chartT)chartT.destroy();
  const ctx=document.getElementById("chart-tend").getContext("2d");
  chartT=new Chart(ctx,{type:"line",data:{labels:semanas.map(s=>{const d=new Date(s+"T12:00:00");return d.getDate()+"/"+(d.getMonth()+1);}),datasets:[{label:"Ventas",data:vSem,borderColor:"#185FA5",backgroundColor:"rgba(24,95,165,.1)",tension:.3,fill:true,pointBackgroundColor:"#185FA5"}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10}},grid:{color:"#f5f5f3"}}}}});
}

async function registrarRebote(){
  const cliente=document.getElementById("rb-cliente").value.trim();
  const motivo=document.getElementById("rb-motivo").value;
  const fecha=document.getElementById("rb-fecha").value||hoy();
  if(!cliente)return;
  await sb("POST","movimientos",{tipo:"gasto",descripcion:motivo,categoria:"rebote",monto:0,forma_pago:"efectivo",fecha,cliente_nombre:cliente});
  document.getElementById("rb-cliente").value="";cargar();
}

document.getElementById("rb-fecha").value=hoy();
cargar();setInterval(cargar,60000);
</script>
</body>
</html>
